<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Big Nik · Sistema Interno</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080808;--bg2:#0f0f0f;--bg3:#161616;--bg4:#1e1e1e;--bg5:#282828;
  --gold:#DDB888;--gold2:#C4956A;--gold3:#9B6A38;--gold4:#7a5530;
  --green:#2dd468;--green-bg:rgba(45,212,104,.08);--green-bd:rgba(45,212,104,.25);
  --red:#f04848;--red-bg:rgba(240,72,72,.08);--red-bd:rgba(240,72,72,.25);
  --orange:#f5a623;--purple:#9b6dff;--cyan:#22d3ee;
  --t1:#f5f0ea;--t2:#bbb;--t3:#777;--t4:#444;--t5:#2a2a2a;
  --glass:rgba(255,255,255,.03);--glass2:rgba(255,255,255,.06);
  --radius:12px;--radius2:8px;--radius3:6px;
  --font-display:'Oswald',system-ui,sans-serif;
  --font-body:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  --shadow:0 2px 20px rgba(0,0,0,.5);
  --shadow2:0 1px 3px rgba(0,0,0,.3);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--font-body);overflow:hidden;-webkit-tap-highlight-color:transparent;font-size:14px;line-height:1.4;-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
input,textarea{font-family:var(--font-body);background:var(--bg3);color:var(--t1);border:1px solid var(--t4);border-radius:var(--radius3);padding:11px 14px;font-size:13px;outline:none;transition:border .2s}
input:focus,textarea:focus{border-color:var(--gold2);box-shadow:0 0 0 3px rgba(196,149,106,.1)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--t4);border-radius:3px}
::selection{background:var(--gold2);color:var(--bg)}

/* ═══ LAYOUT ═══ */
.screen{display:none;position:fixed;inset:0;flex-direction:column;overflow:hidden;background:var(--bg)}
.screen.active{display:flex}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:linear-gradient(180deg,var(--bg2),var(--bg));border-bottom:1px solid var(--t5);min-height:54px;flex-shrink:0}
.topbar .role{display:flex;align-items:center;gap:10px;font-family:var(--font-display);font-size:14px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:600}
.topbar .role img{width:28px;height:28px;border-radius:4px}
.topbar .role .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.topbar-right{display:flex;gap:8px}
.btn-top{padding:7px 16px;border-radius:var(--radius3);font-family:var(--font-display);font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:500;background:var(--glass2);color:var(--t2);border:1px solid var(--t4);backdrop-filter:blur(4px);transition:.2s}
.btn-top:hover{background:var(--bg4);border-color:var(--t3)}
.btn-top.accent{background:linear-gradient(135deg,var(--gold2),var(--gold3));color:var(--bg);border:none;font-weight:600}

.tabs{display:flex;gap:0;padding:0 16px;background:var(--bg);border-bottom:1px solid var(--t5);flex-shrink:0}
.tab{padding:12px 18px;font-family:var(--font-display);font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);background:none;border:none;border-bottom:2px solid transparent;display:flex;align-items:center;gap:7px;transition:color .2s;font-weight:500}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover{color:var(--t1)}

.content{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}

/* ═══ LOGIN ═══ */
#login.active{display:flex}
#login{align-items:center;justify-content:flex-start;background:var(--bg);overflow-y:auto;overflow-x:hidden;position:relative;-webkit-overflow-scrolling:touch;padding:40px 0}

/* Film grain overlay */
#login::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:1}

/* Warm ambient glow behind logo */
#login::after{content:'';position:fixed;top:10%;left:50%;transform:translateX(-50%);width:600px;height:500px;background:radial-gradient(ellipse,rgba(196,149,106,.09) 0%,rgba(196,149,106,.02) 45%,transparent 70%);pointer-events:none;z-index:0}

/* Side gorilla — left */
.login-atmo-left{position:fixed;left:-80px;top:50%;transform:translateY(-50%);width:380px;opacity:.04;filter:invert(1);pointer-events:none;z-index:0;animation:atmoL 2.5s ease-out .4s both}
/* Profile gorilla — right */
.login-atmo-right{position:fixed;right:-50px;top:45%;transform:translateY(-50%);width:320px;opacity:.035;filter:invert(1);pointer-events:none;z-index:0;animation:atmoR 2.5s ease-out .6s both}

/* Bottom warm haze */
.login-smoke{position:fixed;bottom:0;left:0;right:0;height:35%;background:linear-gradient(0deg,rgba(196,149,106,.035) 0%,transparent 100%);pointer-events:none;z-index:1}

/* Entrance animations */
@keyframes logoIn{0%{opacity:0;transform:scale(.88) translateY(24px)}65%{transform:scale(1.015) translateY(-3px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes subIn{0%{opacity:0;letter-spacing:18px}100%{opacity:.6;letter-spacing:8px}}
@keyframes fadeUp{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:translateY(0)}}
@keyframes slideIn{0%{opacity:0;transform:translateX(-24px)}100%{opacity:1;transform:translateX(0)}}
@keyframes atmoL{0%{opacity:0;transform:translateY(-50%) translateX(-60px)}100%{opacity:.04;transform:translateY(-50%) translateX(0)}}
@keyframes atmoR{0%{opacity:0;transform:translateY(-50%) translateX(60px)}100%{opacity:.035;transform:translateY(-50%) translateX(0)}}
@keyframes breathe{0%,100%{filter:drop-shadow(0 6px 32px rgba(196,149,106,.18))}50%{filter:drop-shadow(0 6px 44px rgba(196,149,106,.32))}}
@keyframes lineGrow{0%{width:0;opacity:0}100%{width:70px;opacity:1}}

.login-box{width:100%;max-width:440px;padding:24px 28px;text-align:center;position:relative;z-index:5;margin:auto}

/* Hero logo */
.login-logo{margin-bottom:10px;animation:logoIn .9s cubic-bezier(.25,.8,.25,1) both}
.login-logo img{width:220px;filter:drop-shadow(0 6px 32px rgba(196,149,106,.18));animation:breathe 5s ease-in-out 2s infinite}

/* Subtitle */
.login-sub{font-family:var(--font-display);font-size:10px;letter-spacing:8px;text-transform:uppercase;color:var(--gold3);margin-bottom:36px;font-weight:400;animation:subIn 1.2s ease-out .35s both}

/* Gold accent line */
.login-divider{height:1px;background:linear-gradient(90deg,transparent,var(--gold2),transparent);margin:0 auto 30px;animation:lineGrow .8s ease-out .55s both}

/* Title */
.login-title{font-family:var(--font-display);font-size:18px;letter-spacing:5px;text-transform:uppercase;color:var(--t1);margin-bottom:26px;font-weight:500;animation:fadeUp .6s ease-out .65s both}

/* Role buttons */
.role-btn{display:flex;align-items:center;gap:18px;width:100%;padding:18px 22px;margin-bottom:10px;background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.05);border-radius:var(--radius);text-align:left;transition:all .3s cubic-bezier(.25,.8,.25,1);backdrop-filter:blur(10px);position:relative;overflow:hidden}
.role-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gold),var(--gold2));opacity:0;transition:opacity .3s}
.role-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(196,149,106,.03),transparent);opacity:0;transition:opacity .3s}
.role-btn:hover{border-color:rgba(196,149,106,.25);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.5),0 0 0 1px rgba(196,149,106,.08)}
.role-btn:hover::before{opacity:1}
.role-btn:hover::after{opacity:1}
.role-btn:active{transform:translateY(0);transition-duration:.1s}
.role-btn:nth-child(1){animation:slideIn .5s ease-out .85s both}
.role-btn:nth-child(2){animation:slideIn .5s ease-out 1s both}
.role-btn:nth-child(3){animation:slideIn .5s ease-out 1.15s both}
.role-btn .icon{font-size:22px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,var(--bg4),var(--bg3));border-radius:10px;border:1px solid var(--t5);flex-shrink:0}
.role-btn .info h3{font-family:var(--font-display);font-size:15px;letter-spacing:3px;text-transform:uppercase;color:var(--t1);font-weight:600;margin-bottom:2px}
.role-btn .info p{font-size:11px;color:var(--t3);letter-spacing:.3px}

/* Footer credit */
.login-footer{margin-top:32px;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--t4);animation:fadeUp .5s ease-out 1.4s both}
.login-box{width:100%;max-width:460px;padding:30px;text-align:center}
.login-logo{margin-bottom:6px}
.login-logo img{width:200px;filter:drop-shadow(0 4px 24px rgba(196,149,106,.2))}
.login-sub{font-family:var(--font-display);font-size:11px;letter-spacing:8px;text-transform:uppercase;color:var(--t3);margin-bottom:36px;font-weight:400}
.login-title{font-family:var(--font-display);font-size:20px;letter-spacing:4px;text-transform:uppercase;color:var(--t1);margin-bottom:28px;font-weight:600}
.role-btn{display:flex;align-items:center;gap:18px;width:100%;padding:18px 24px;margin-bottom:10px;background:var(--glass);border:1px solid var(--t5);border-radius:var(--radius);text-align:left;transition:all .25s;backdrop-filter:blur(8px)}
.role-btn:hover{border-color:var(--gold3);background:rgba(196,149,106,.06);transform:translateY(-1px);box-shadow:var(--shadow)}
.role-btn:active{transform:translateY(0)}
.role-btn .icon{font-size:26px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border-radius:var(--radius2);border:1px solid var(--t4)}
.role-btn .info h3{font-family:var(--font-display);font-size:15px;letter-spacing:3px;text-transform:uppercase;color:var(--t1);font-weight:600;margin-bottom:3px}
.role-btn .info p{font-size:12px;color:var(--t3);letter-spacing:.5px}

/* ═══ MESAS GRID ═══ */
.zone-title{font-family:var(--font-display);font-size:12px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);font-weight:600;margin:24px 0 12px;display:flex;align-items:center;gap:8px}
.zone-title:first-child{margin-top:0}
.mesas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:8px}
.mesa-card{padding:16px 18px;border-radius:var(--radius);border:1px solid var(--green-bd);background:var(--green-bg);cursor:pointer;transition:all .2s;min-height:100px;position:relative;overflow:hidden}
.mesa-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--green);opacity:.4}
.mesa-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(45,212,104,.1)}
.mesa-card.ocupada{border-color:var(--red-bd);background:var(--red-bg)}
.mesa-card.ocupada::before{background:var(--red)}
.mesa-card .name{font-family:var(--font-display);font-size:17px;font-weight:700;color:var(--green);letter-spacing:1px}
.mesa-card.ocupada .name{color:var(--red)}
.mesa-card .meta{font-size:12px;color:var(--t3);margin-top:3px}
.mesa-card .timer{font-size:11px;color:var(--orange);margin-top:5px;font-weight:500}
.mesa-card .dots{display:flex;gap:5px;margin-top:10px}
.mesa-card .dots span{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--t4);transition:.2s}
.mesa-card .dots span.filled{background:var(--gold);border-color:var(--gold);box-shadow:0 0 4px rgba(221,184,136,.3)}

/* ═══ MESA DETAIL ═══ */
.detail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.detail-header h2{font-family:var(--font-display);font-size:20px;font-weight:700;display:flex;align-items:center;gap:12px}
.detail-header .back{font-size:22px;color:var(--t2);background:none;padding:4px 8px;transition:.2s}
.detail-header .back:hover{color:var(--gold)}
.detail-header .status{font-family:var(--font-display);font-size:11px;padding:5px 14px;border-radius:20px;letter-spacing:2px;text-transform:uppercase;font-weight:500}
.detail-header .status.libre{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.detail-header .status.ocupada{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}

.detail-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--t5)}
.detail-label{font-size:13px;color:var(--t2)}
.qty-ctrl{display:flex;align-items:center;gap:14px}
.qty-ctrl button{width:38px;height:38px;border-radius:var(--radius3);background:var(--bg3);color:var(--t1);font-size:18px;border:1px solid var(--t4);display:flex;align-items:center;justify-content:center;transition:.15s}
.qty-ctrl button:hover{border-color:var(--gold2);color:var(--gold)}
.qty-ctrl span{font-family:var(--font-display);font-size:22px;font-weight:700;min-width:30px;text-align:center}

.nota-section{margin:18px 0}
.nota-section label{display:block;font-family:var(--font-display);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;font-weight:500}
.nota-section textarea{width:100%;height:60px;resize:none;font-size:13px}

.pedido-section{margin:18px 0}
.pedido-section h3{font-family:var(--font-display);font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;font-weight:600}
.pedido-item{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--t5)}
.pedido-item .left{display:flex;align-items:center;gap:10px}
.pedido-item .qty{font-family:var(--font-display);font-size:17px;font-weight:700;color:var(--gold);min-width:28px}
.pedido-item .item-name{font-size:14px;color:var(--t1);font-weight:500}
.pedido-item .right{display:flex;align-items:center;gap:10px}
.pedido-item .item-status{font-family:var(--font-display);font-size:9px;padding:3px 10px;border-radius:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500}
.pedido-item .item-status.preparando{background:rgba(245,166,35,.1);color:var(--orange);border:1px solid rgba(245,166,35,.2)}
.pedido-item .item-status.listo{background:rgba(45,212,104,.1);color:var(--green);border:1px solid rgba(45,212,104,.2)}
.pedido-item .item-price{font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--gold)}
.pedido-item .remove{color:var(--red);font-size:16px;background:none;padding:6px;opacity:.6;transition:.2s}
.pedido-item .remove:hover{opacity:1}

.pedido-total{display:flex;justify-content:space-between;padding:14px 0;font-weight:700;font-size:16px}
.pedido-total .amount{font-family:var(--font-display);color:var(--gold);font-size:18px}

.action-bar{display:flex;gap:10px;padding:14px 20px;background:linear-gradient(0deg,var(--bg2),var(--bg));border-top:1px solid var(--t5);flex-shrink:0}
.action-btn{flex:1;padding:14px;border-radius:var(--radius2);font-family:var(--font-display);font-size:13px;letter-spacing:2px;text-transform:uppercase;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.action-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.action-btn:active{transform:translateY(0)}
.action-btn.pedido{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg)}
.action-btn.comanda{background:linear-gradient(135deg,#e84040,#c03030);color:#fff}
.action-btn.cuenta{background:linear-gradient(135deg,var(--purple),#7c4dff);color:#fff}
.action-btn.cerrar{background:linear-gradient(135deg,var(--cyan),#0ea5e9);color:var(--bg)}
.action-btn:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
.action-btn.sent{background:var(--bg4);color:var(--green);border:1px solid var(--green-bd);opacity:.7}

/* ═══ MENU BROWSER ═══ */
.menu-overlay{display:none;position:fixed;inset:0;z-index:100;background:var(--bg);flex-direction:column}
.menu-overlay.active{display:flex}
.menu-search{padding:14px 20px;border-bottom:1px solid var(--t5)}
.menu-search input{width:100%;padding:11px 16px 11px 38px;border-radius:24px;font-size:13px;background:var(--bg3);border:1px solid var(--t5)}
.cat-tabs{display:flex;gap:0;padding:6px 12px;overflow-x:auto;flex-shrink:0;border-bottom:1px solid var(--t5);-webkit-overflow-scrolling:touch}
.cat-tab{padding:9px 14px;font-family:var(--font-display);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);background:none;white-space:nowrap;border:none;border-bottom:2px solid transparent;flex-shrink:0;transition:.2s;font-weight:500}
.cat-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.menu-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.menu-item{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--t5);transition:background .15s}
.menu-item:active{background:var(--glass2)}
.menu-item .info h4{font-size:14px;color:var(--t1);font-weight:600}
.menu-item .info p{font-size:12px;color:var(--t3);margin-top:2px}
.menu-item .right{display:flex;align-items:center;gap:14px}
.menu-item .price{font-family:var(--font-display);font-size:17px;font-weight:700;color:var(--gold)}
.menu-item .add-btn{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(196,149,106,.3);transition:.15s}
.menu-item .add-btn:active{transform:scale(.92)}
.menu-footer{padding:14px 20px;background:var(--bg2);border-top:1px solid var(--t5);text-align:center;font-size:12px;color:var(--t3);font-style:italic}

/* ═══ COBRAR ═══ */
.cobrar-overlay{display:none;position:fixed;inset:0;z-index:100;background:var(--bg);flex-direction:column}
.cobrar-overlay.active{display:flex}
.cobrar-content{flex:1;overflow-y:auto;padding:20px;-webkit-overflow-scrolling:touch}
.cobrar-header{display:flex;align-items:center;gap:12px}
.cobrar-header .back{font-size:22px;color:var(--t2);background:none;padding:4px 8px}
.cobrar-header h2{font-family:var(--font-display);font-size:16px;letter-spacing:3px;text-transform:uppercase;color:var(--cyan);font-weight:600;display:flex;align-items:center;gap:8px}
.cobrar-mesa{text-align:center;font-size:13px;color:var(--t3);margin-bottom:24px}
.option-group{margin-bottom:22px}
.option-group label{display:block;font-family:var(--font-display);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;font-weight:500}
.option-row{display:flex;gap:8px}
.option-btn{flex:1;padding:13px 8px;border-radius:var(--radius2);font-family:var(--font-display);font-size:11px;letter-spacing:1px;text-transform:uppercase;font-weight:500;background:var(--bg3);color:var(--t2);border:1px solid var(--t5);display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s}
.option-btn.selected{border-color:var(--green);color:var(--green);background:var(--green-bg);box-shadow:0 0 0 1px var(--green-bd)}
.cobrar-summary{background:var(--bg3);border:1px solid var(--t5);border-radius:var(--radius);padding:18px;margin:20px 0}
.cobrar-summary .row{display:flex;justify-content:space-between;padding:7px 0;font-size:13px;color:var(--t2)}
.cobrar-summary .row.total{font-family:var(--font-display);font-weight:700;font-size:20px;color:var(--gold);border-top:1px solid var(--t4);padding-top:12px;margin-top:6px}
.confirm-btn{width:100%;padding:16px;border-radius:var(--radius);font-family:var(--font-display);font-size:14px;letter-spacing:3px;text-transform:uppercase;font-weight:700;background:linear-gradient(135deg,var(--green),#1fa855);color:var(--bg);display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;box-shadow:0 4px 16px rgba(45,212,104,.2);transition:.2s}
.confirm-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(45,212,104,.3)}

/* ═══ COCINA KDS ═══ */
.kds-counters{display:flex;gap:28px;padding:0 0 22px;border-bottom:1px solid var(--t5);margin-bottom:22px}
.kds-counter{text-align:center}
.kds-counter .num{font-family:var(--font-display);font-size:40px;font-weight:700}
.kds-counter .num.nuevas{color:var(--gold)}
.kds-counter .num.cocinando{color:var(--orange)}
.kds-counter .num.listas{color:var(--green)}
.kds-counter .lbl{font-family:var(--font-display);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--t3);margin-top:2px}
.kds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.kds-card{border:2px solid var(--gold2);border-radius:var(--radius);padding:20px;background:var(--bg3);position:relative;overflow:hidden}
.kds-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gold2)}
.kds-card.cocinando{border-color:var(--orange)}.kds-card.cocinando::before{background:var(--orange)}
.kds-card.listo{border-color:var(--green)}.kds-card.listo::before{background:var(--green)}
.kds-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.kds-card-header h3{font-family:var(--font-display);font-size:24px;font-weight:700}
.kds-card-header .timer{font-family:var(--font-display);font-size:12px;padding:4px 12px;border-radius:20px;background:var(--bg4);color:var(--t2);font-weight:500}
.kds-card .zone-info{font-family:var(--font-display);font-size:12px;color:var(--t3);text-transform:uppercase;letter-spacing:3px;margin-bottom:16px}
.kds-card .items{margin-bottom:18px}
.kds-card .kds-item{display:flex;align-items:center;gap:12px;padding:8px 0;font-size:16px}
.kds-card .kds-qty{font-family:var(--font-display);font-weight:700;font-size:22px;min-width:28px;color:var(--gold)}
.kds-btn{width:100%;padding:14px;border-radius:var(--radius2);font-family:var(--font-display);font-size:14px;letter-spacing:3px;text-transform:uppercase;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;transition:.2s}
.kds-btn.iniciar{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg)}
.kds-btn.listo-btn{background:linear-gradient(135deg,var(--green),#1fa855);color:var(--bg)}
.kds-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow)}

/* ═══ HISTORIAL ═══ */
.hist-card{background:var(--bg3);border:1px solid var(--t5);border-radius:var(--radius);padding:16px 20px;margin-bottom:10px;transition:.15s}
.hist-card:hover{border-color:var(--t4)}
.hist-card-header{display:flex;justify-content:space-between;align-items:flex-start}
.hist-card-header .mesa-info h4{font-family:var(--font-display);font-size:15px;font-weight:700;letter-spacing:1px}
.hist-card-header .mesa-info span{font-size:12px;color:var(--t3)}
.hist-card-header .amount{text-align:right}
.hist-card-header .amount .total{font-family:var(--font-display);font-size:19px;font-weight:700;color:var(--gold)}
.hist-card-header .amount .time{font-size:11px;color:var(--t3)}
.hist-tags{display:flex;gap:6px;margin:8px 0}
.hist-tag{font-family:var(--font-display);font-size:10px;padding:3px 10px;border-radius:10px;background:var(--bg4);color:var(--t2);letter-spacing:1px;font-weight:500}
.hist-items{font-size:12px;color:var(--t3)}

/* ═══ ADMIN ═══ */
.report-filters{display:flex;gap:8px;margin-bottom:22px}
.filter-btn{padding:9px 22px;border-radius:var(--radius3);font-family:var(--font-display);font-size:12px;letter-spacing:2px;text-transform:uppercase;font-weight:500;background:var(--bg3);color:var(--t2);border:1px solid var(--t5);transition:.2s}
.filter-btn.active{border-color:var(--gold2);color:var(--gold);background:rgba(196,149,106,.06)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:26px}
.kpi-card{background:var(--bg3);border:1px solid var(--t5);border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold2),transparent)}
.kpi-card .kpi-label{font-family:var(--font-display);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--t3);margin-bottom:6px;font-weight:500}
.kpi-card .kpi-value{font-family:var(--font-display);font-size:30px;font-weight:700;color:var(--green)}
.kpi-card .kpi-sub{font-size:11px;color:var(--t3);margin-top:3px}
.chart-section{margin:26px 0}
.chart-section h3{font-family:var(--font-display);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:8px;font-weight:500}
.chart-container{background:var(--bg3);border:1px solid var(--t5);border-radius:var(--radius);padding:20px;height:200px;display:flex;align-items:flex-end;gap:3px}
.chart-bar{flex:1;background:linear-gradient(0deg,var(--gold3),var(--gold));border-radius:3px 3px 0 0;min-height:2px;transition:height .4s}
.breakdown-section{margin:26px 0}
.breakdown-card{background:var(--bg3);border:1px solid var(--t5);border-radius:var(--radius);padding:16px 20px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.breakdown-card .label{font-family:var(--font-display);font-size:14px;font-weight:600;letter-spacing:1px;min-width:80px}
.breakdown-card .bar{flex:1;height:4px;background:var(--t5);border-radius:2px;margin:0 20px}
.breakdown-card .bar .fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;transition:width .4s}
.breakdown-card .amount{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--gold)}
.breakdown-card .pct{font-size:11px;color:var(--t3);margin-top:2px}
.turno-total{background:var(--bg3);border:1px solid var(--t5);border-radius:var(--radius);padding:18px 24px;display:flex;justify-content:space-between;align-items:center;margin:22px 0}
.turno-total .lbl{font-family:var(--font-display);font-size:12px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);font-weight:600}
.turno-total .val{font-family:var(--font-display);font-size:32px;font-weight:700;color:var(--gold)}
.admin-btn{width:100%;padding:14px;border-radius:var(--radius);font-family:var(--font-display);font-size:13px;letter-spacing:2px;text-transform:uppercase;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;transition:.2s}
.admin-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.admin-btn.export{background:linear-gradient(135deg,var(--green),#1fa855);color:var(--bg)}
.admin-btn.cerrar-turno{background:linear-gradient(135deg,var(--red),#c03030);color:#fff}

/* ═══ SETUP ═══ */
.setup-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.95);align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px)}
.setup-overlay.active{display:flex}
.setup-box{background:var(--bg3);border:1px solid var(--gold3);border-radius:var(--radius);padding:30px;max-width:440px;width:100%}

/* ═══ TOAST ═══ */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);padding:12px 28px;border-radius:24px;font-family:var(--font-display);font-size:13px;font-weight:600;letter-spacing:1px;z-index:999;opacity:0;transition:all .3s;pointer-events:none;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--green);color:var(--bg)}
.toast.warn{background:var(--orange);color:var(--bg)}
.toast.err{background:var(--red);color:#fff}
.empty{text-align:center;padding:50px 20px;color:var(--t3);font-size:13px;font-style:italic}
</style>
</head>

}

async function loadFromSupabase(){
  if(!S.sb) return;
  try{
    // Load active orders
    const {data:orders}=await S.sb.from('bignik_orders').select('*').eq('status','active');
    if(orders){
      S.orders={};
      orders.forEach(o=>{S.orders[o.mesa_id]={...o, items:typeof o.items==='string'?JSON.parse(o.items):o.items, created:new Date(o.created_at)};});
    }
    // Load today's sales
    const today=new Date();today.setHours(0,0,0,0);
    const {data:sales}=await S.sb.from('bignik_sales').select('*').gte('created_at',today.toISOString()).order('created_at',{ascending:false});
    if(sales){
      S.sales=sales.map(s=>({...s, items:typeof s.items==='string'?JSON.parse(s.items):s.items, created:new Date(s.created_at)}));
    }
    // Get comanda counter
    const {data:cnt}=await S.sb.from('bignik_orders').select('comanda_num').order('comanda_num',{ascending:false}).limit(1);
    if(cnt&&cnt.length) S.comandaNum=cnt[0].comanda_num+1;
  }catch(e){console.error('Load error:',e)}
}

function subscribeRealtime(){
  if(!S.sb||S.sbChannel) return;
  S.sbChannel=S.sb.channel('bignik-sync')
    .on('postgres_changes',{event:'*',schema:'public',table:'bignik_orders'},payload=>{
      handleOrderChange(payload);
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'bignik_sales'},payload=>{
      if(payload.new){
        const s={...payload.new, items:typeof payload.new.items==='string'?JSON.parse(payload.new.items):payload.new.items, created:new Date(payload.new.created_at)};
        if(!S.sales.find(x=>x.id===s.id)) S.sales.unshift(s);
        renderCurrentView();
      }
    })
    .subscribe();
}

function handleOrderChange(payload){
  const {eventType,new:newRec,old:oldRec}=payload;
  if(eventType==='INSERT'||eventType==='UPDATE'){
    const o={...newRec, items:typeof newRec.items==='string'?JSON.parse(newRec.items):newRec.items, created:new Date(newRec.created_at)};
    if(newRec.status==='active') S.orders[newRec.mesa_id]=o;
    else delete S.orders[newRec.mesa_id];
  }else if(eventType==='DELETE'&&oldRec){
    delete S.orders[oldRec.mesa_id];
  }
  renderCurrentView();
}

async function saveOrder(mesaId){
  const order=S.orders[mesaId];
  if(!order) return;
  if(S.sb){
    try{
      const data={mesa_id:mesaId,zona:order.zona,items:JSON.stringify(order.items),personas:order.personas,nota:order.nota||'',status:'active',comanda_num:order.comanda_num||0,comanda_status:order.comanda_status||'none',updated_at:new Date().toISOString()};
      if(order.id){
        await S.sb.from('bignik_orders').update(data).eq('id',order.id);
      }else{
        data.created_at=new Date().toISOString();
        const {data:ins}=await S.sb.from('bignik_orders').insert(data).select();
        if(ins&&ins[0]) order.id=ins[0].id;
      }
    }catch(e){console.error('Save order error:',e)}
  }
  saveLocal();
}

async function saveSale(sale){
  S.sales.unshift(sale);
  if(S.sb){
    try{
      await S.sb.from('bignik_sales').insert({mesa_id:sale.mesa_id,zona:sale.zona,items:JSON.stringify(sale.items),subtotal:sale.subtotal,propina:sale.propina,descuento:sale.descuento,total:sale.total,metodo_pago:sale.metodo_pago,tipo_doc:sale.tipo_doc,nota:sale.nota||'',created_at:sale.created.toISOString()});
    }catch(e){console.error('Save sale error:',e)}
  }
  saveLocal();
}

async function deleteOrder(mesaId){
  const order=S.orders[mesaId];
  if(order&&order.id&&S.sb){
    try{await S.sb.from('bignik_orders').delete().eq('id',order.id)}catch(e){console.error(e)}
  }
  delete S.orders[mesaId];
  saveLocal();
}

// localStorage fallback
function saveLocal(){
  localStorage.setItem('bignik_orders',JSON.stringify(S.orders));
  localStorage.setItem('bignik_sales',JSON.stringify(S.sales));
  localStorage.setItem('bignik_comanda',S.comandaNum);
}
function loadLocal(){
  try{
    const o=JSON.parse(localStorage.getItem('bignik_orders')||'{}');
    Object.keys(o).forEach(k=>{if(o[k].created) o[k].created=new Date(o[k].created)});
    S.orders=o;
    const s=JSON.parse(localStorage.getItem('bignik_sales')||'[]');
    s.forEach(x=>{if(x.created) x.created=new Date(x.created)});
    S.sales=s;
    S.comandaNum=parseInt(localStorage.getItem('bignik_comanda')||'1');
  }catch(e){console.error(e)}
}

function renderMesas(c){
  let html='';
  ZONES.forEach(zone=>{
    html+=`<div class="zone-title">${zone.emoji} ${zone.name.toUpperCase()}</div><div class="mesas-grid">`;
    zone.mesas.forEach(m=>{
      const order=S.orders[m.id];
      const ocu=!!(order&&order.items&&order.items.length>0);
      const mins=ocu?diffMin(order.created,now()):0;
      const personas=ocu?order.personas:0;
      html+=`<div class="mesa-card${ocu?' ocupada':''}" data-mesa="${m.id}" data-zone="${zone.id}">
        <div class="name">MESA ${m.id}</div>

        <div class="dots">${Array.from({length:m.cap},(_,i)=>`<span class="${i<personas?'filled':''}"></span>`).join('')}</div>
      </div>`;
    });
    html+=`</div>`;
  });

function renderComandas(c){
  const comandas=Object.values(S.orders).filter(o=>['enviada','cocinando','listo','entregado'].includes(o.comanda_status));

function renderPorCobrar(c){
  const pendientes=Object.entries(S.orders).filter(([,o])=>o.items&&o.items.length>0&&o.comanda_status!=='none');
  if(!pendientes.length){c.innerHTML='<div class="empty">No hay mesas por cobrar</div>';return}

  const co=S.cobrar;
  const propAmt=co.propina==='10'?Math.round(sub*.1):co.propina==='otro'?co.propinaCustom:0;
  const descAmt=co.descuento==='pct'?Math.round(sub*(co.descuentoVal/100)):co.descuento==='monto'?co.descuentoVal:0;
  const total=Math.max(0,sub+propAmt-descAmt);

  const sale={mesa_id:S.selectedMesa,zona:order.zona,items:order.items.map(i=>({...i})),subtotal:sub,propina:propAmt,descuento:descAmt,total:total,metodo_pago:co.metodoPago,tipo_doc:co.tipoDoc,nota:co.nota,created:now()};

function renderCocina(){
  const orders=Object.values(S.orders).filter(o=>o.comanda_status==='enviada'||o.comanda_status==='cocinando'||o.comanda_status==='listo');
  const nuevas=orders.filter(o=>o.comanda_status==='enviada').length;
  const cocinando=orders.filter(o=>o.comanda_status==='cocinando').length;
  const listas=orders.filter(o=>o.comanda_status==='listo').length;

  let html=`<div class="kds-counters">
    <div class="kds-counter"><div class="num nuevas">${nuevas}</div><div class="lbl">Nuevas</div></div>
    <div class="kds-counter"><div class="num cocinando">${cocinando}</div><div class="lbl">Cocinando</div></div>
    <div class="kds-counter"><div class="num listas">${listas}</div><div class="lbl">Listas</div></div>
  </div><div class="kds-grid">`;

  const sorted=orders.sort((a,b)=>{const pri={enviada:0,cocinando:1,listo:2};return (pri[a.comanda_status]||9)-(pri[b.comanda_status]||9)});
  sorted.forEach(o=>{
    const mins=diffMin(o.created,now());
    const st=o.comanda_status;
    html+=`<div class="kds-card ${st}">
      <div class="kds-card-header"><h3>MESA ${o.mesa_id}</h3><span class="timer">⏱ ${mins} min</span></div>
      <div class="zone-info">${getZoneName(o.zona)} · #${o.comanda_num}</div>
      <div class="items">${o.items.map(i=>`<div class="kds-item"><span class="kds-qty">${i.qty}</span><span>${i.name}</span></div>`).join('')}</div>
      ${st==='enviada'?`<button class="kds-btn iniciar" data-kds-action="iniciar" data-kds-mesa="${o.mesa_id}">▶ Iniciar</button>`:''}
      ${st==='cocinando'?`<button class="kds-btn listo-btn" data-kds-action="listo" data-kds-mesa="${o.mesa_id}">✓ Listo</button>`:''}
      ${st==='listo'?`<button class="kds-btn listo-btn" data-kds-action="entregar" data-kds-mesa="${o.mesa_id}">✓ Entregar a Mesa</button>`:''}
    </div>`;
  });
  html+=`</div>`;
  if(!orders.length) html='<div class="empty">No hay comandas · Esperando pedidos...</div>';
  $('cocinaContent').innerHTML=html;
}

function renderAdmin(){
  const f=S.adminFilter;
  const sales=getFilteredSales(f);
  const totalVentas=sales.reduce((s,x)=>s+x.total,0);
  const totalPropinas=sales.reduce((s,x)=>s+x.propina,0);
  const totalSub=sales.reduce((s,x)=>s+x.subtotal,0);
  const mesasAtendidas=sales.length;
  const ticketProm=mesasAtendidas?Math.round(totalVentas/mesasAtendidas):0;

  // Ventas por hora
  const hourly={};
  sales.forEach(s=>{const h=s.created.getHours();hourly[h]=(hourly[h]||0)+s.total});
  const maxH=Math.max(...Object.values(hourly),1);

  // Desglose documento
  const byDoc={};sales.forEach(s=>{byDoc[s.tipo_doc]=(byDoc[s.tipo_doc]||0)+s.total});
  // Desglose pago
  const byPago={};sales.forEach(s=>{byPago[s.metodo_pago]=(byPago[s.metodo_pago]||0)+s.total});

  let html=`
    <div class="report-filters">
      ${['hoy','semana','mes'].map(x=>`<button class="filter-btn${f===x?' active':''}" data-filter="${x}">${x.toUpperCase()}</button>`).join('')}
    </div>
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">Ventas ${f}</div><div class="kpi-value">${fmt(totalVentas)}</div><div class="kpi-sub">${mesasAtendidas} mesas atendidas</div></div>
      <div class="kpi-card"><div class="kpi-label">Propinas</div><div class="kpi-value" style="color:var(--gold)">${fmt(totalPropinas)}</div><div class="kpi-sub">de ${fmt(totalVentas)} en ventas</div></div>
      <div class="kpi-card"><div class="kpi-label">Ticket Promedio</div><div class="kpi-value">${fmt(ticketProm)}</div><div class="kpi-sub">por mesa</div></div>
      <div class="kpi-card"><div class="kpi-label">Subtotal s/ Propina</div><div class="kpi-value">${fmt(totalSub)}</div><div class="kpi-sub">antes de propina</div></div>
    </div>
    <div class="chart-section"><h3>📈 Ventas por Hora — ${f}</h3><div class="chart-container">
      ${Array.from({length:24},(_,h)=>`<div class="chart-bar" style="height:${(hourly[h]||0)/maxH*100}%" title="${h}:00 — ${fmt(hourly[h]||0)}"></div>`).join('')}
    </div></div>`;

  // Desglose por método de pago
  html+=`<div class="breakdown-section"><h3 style="font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:12px">Por Método de Pago</h3>`;
  ['efectivo','débito','crédito','transfer'].forEach(m=>{
    const amt=byPago[m]||0;const pct=totalVentas?Math.round(amt/totalVentas*100):0;
    html+=`<div class="breakdown-card"><span class="label">${capitalize(m)}</span><div class="bar"><div class="fill" style="width:${pct}%"></div></div><div style="text-align:right"><div class="amount">${fmt(amt)}</div><div class="pct">${pct}% del total</div></div></div>`;
  });
  html+=`</div>`;

  html+=`<div class="turno-total"><span class="lbl">Total Turno</span><span class="val">${fmt(totalVentas)}</span></div>`;
  html+=`<button class="admin-btn export" data-action="export-csv">📑 Exportar Historial a CSV</button>`;
  html+=`<button class="admin-btn cerrar-turno" data-action="cerrar-turno">🔒 Cerrar Turno / Caja</button>`;

  // Desglose tipo documento
  html+=`<div class="breakdown-section" style="margin-top:24px"><h3 style="font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:12px">Por Tipo de Documento</h3>`;
  ['boleta','factura','b. exenta'].forEach(d=>{
    const amt=byDoc[d]||0;const pct=totalVentas?Math.round(amt/totalVentas*100):0;
    html+=`<div class="breakdown-card"><span class="label">${d.toUpperCase()}</span><div class="bar"><div class="fill" style="width:${pct}%"></div></div><div style="text-align:right"><div class="amount">${fmt(amt)}</div><div class="pct">${pct}% del total</div></div></div>`;
  });
  html+=`</div>`;

  $('adminContent').innerHTML=html;
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function orderTotal(o){return (o.items||[]).reduce((s,i)=>s+i.price*i.qty,0)}
function getZoneName(zoneId){const z=ZONES.find(z=>z.id===zoneId);return z?z.name:''}
function capitalize(s){return s?s.charAt(0).toUpperCase()+s.slice(1):''}

function getFilteredSales(filter){
  const n=now();
  return S.sales.filter(s=>{
    if(!s.created) return false;
    const d=s.created instanceof Date?s.created:new Date(s.created);
    if(filter==='hoy'){
      return d.toDateString()===n.toDateString();
    }else if(filter==='semana'){
      const weekAgo=new Date(n);weekAgo.setDate(weekAgo.getDate()-7);
      return d>=weekAgo;
    }else{
      const monthAgo=new Date(n);monthAgo.setMonth(monthAgo.getMonth()-1);
      return d>=monthAgo;
    }
  });
}

function exportCSV(){
  const sales=getFilteredSales(S.adminFilter);
  if(!sales.length){toast('No hay datos para exportar','warn');return}
  let csv='Mesa,Zona,Items,Subtotal,Propina,Descuento,Total,Método Pago,Documento,Fecha,Hora\n';
  sales.forEach(s=>{
    const d=s.created instanceof Date?s.created:new Date(s.created);
    const items=(s.items||[]).map(i=>`${i.qty}x ${i.name}`).join(' + ');
    csv+=`${s.mesa_id},${getZoneName(s.zona)},"${items}",${s.subtotal},${s.propina},${s.descuento},${s.total},${s.metodo_pago},${s.tipo_doc},${d.toLocaleDateString('es-CL')},${timeStr(d)}\n`;
  });
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`bignik-ventas-${S.adminFilter}-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();toast('CSV descargado','ok');
}

function updateCobrarSummary(){
  const order=S.orders[S.selectedMesa];if(!order)return;
  const sub=orderTotal(order);const co=S.cobrar;
  const propAmt=co.propina==='10'?Math.round(sub*.1):co.propina==='otro'?co.propinaCustom:0;
  const descAmt=co.descuento==='pct'?Math.round(sub*(co.descuentoVal/100)):co.descuento==='monto'?co.descuentoVal:0;
  const total=Math.max(0,sub+propAmt-descAmt);
  const perPerson=co.dividir>1?fmt(Math.ceil(total/co.dividir))+' c/u':'';
  const el=document.querySelector('.cobrar-summary');
  if(el) el.innerHTML=`
    <div class="row"><span>Subtotal</span><span>${fmt(sub)}</span></div>
    <div class="row"><span>Propina</span><span>${fmt(propAmt)}</span></div>
    ${descAmt?`<div class="row"><span>Descuento</span><span>-${fmt(descAmt)}</span></div>`:''}
    <div class="row"><span>Documento</span><span>${capitalize(co.tipoDoc)}</span></div>
    <div class="row"><span>Pago</span><span>${capitalize(co.metodoPago)}</span></div>
    <div class="row total"><span>TOTAL</span><span>${fmt(total)} ${perPerson}</span></div>`;
}

// ═══════════════════════════════════════════
// EVENT DELEGATION
// ═══════════════════════════════════════════
document.addEventListener('click',function(e){
  const t=e.target.closest('[data-role]');
  if(t) return setRole(t.dataset.role);

  // Salir buttons
  if(e.target.id==='btnSalirGarzon'||e.target.id==='btnSalirCocina'||e.target.id==='btnSalirAdmin') return logout();

  // Garzón tabs
  const tab=e.target.closest('#garzonTabs .tab');
  if(tab){S.garzonTab=tab.dataset.tab;renderGarzon();return}

  // Mesa card click
  const mesaCard=e.target.closest('.mesa-card');
  if(mesaCard&&S.role==='garzon'){openMesaDetail(mesaCard.dataset.mesa,mesaCard.dataset.zone);return}

  // Mesa detail back
  if(e.target.id==='btnMesaBack'||e.target.closest('#btnMesaBack')){
    // Save nota before going back
    const nota=$('mesaNota');
    if(nota&&S.orders[S.selectedMesa]){
      S.orders[S.selectedMesa].nota=nota.value;
      // Clean up empty orders (no items)
      if(S.orders[S.selectedMesa].items.length===0){
        delete S.orders[S.selectedMesa];
        saveLocal();
      }else{
        saveOrder(S.selectedMesa);
      }
    }
    S.selectedMesa=null;showScreen('garzon');renderGarzon();return;
  }

  // Personas +/-
  const action=e.target.closest('[data-action]');
  if(action){
    const a=action.dataset.action;
    const order=S.orders[S.selectedMesa];
    if(a==='pers-minus'&&order){order.personas=Math.max(0,order.personas-1);saveOrder(S.selectedMesa);renderMesaDetail(S.selectedMesa)}
    if(a==='pers-plus'&&order){order.personas=Math.min(20,order.personas+1);saveOrder(S.selectedMesa);renderMesaDetail(S.selectedMesa)}
    if(a==='add-pedido') openMenu(S.selectedMesa);
    if(a==='send-comanda'){
      if(order&&order.items.length){
        const hasNewItems=order.items.some(i=>i.status==='pendiente');
        if(order.comanda_status==='none'||hasNewItems){
          order.comanda_status='enviada';
          if(!order.comanda_num) order.comanda_num=S.comandaNum++;
          saveOrder(S.selectedMesa);
          renderMesaDetail(S.selectedMesa);
          toast('📋 Comanda #'+order.comanda_num+' enviada a cocina','ok');
        }
      }
    }
    if(a==='cobrar') openCobrar(S.selectedMesa);
    if(a==='confirm-cobro') confirmCobro();
    if(a==='export-csv') exportCSV();
    if(a==='cerrar-turno'){
      if(confirm('¿Cerrar turno? Esto reinicia los contadores del día.')){
        if(S.sb){try{S.sb.from('bignik_orders').delete().neq('id','').then(()=>{});S.sb.from('bignik_sales').delete().neq('id','').then(()=>{});}catch(e){console.error(e)}}
        S.sales=[];S.orders={};S.comandaNum=1;saveLocal();renderAdmin();toast('Turno cerrado','ok');
      }
    }
    if(a==='div-minus'){S.cobrar.dividir=Math.max(1,S.cobrar.dividir-1);renderCobrar()}
    if(a==='div-plus'){S.cobrar.dividir++;renderCobrar()}
    return;
  }

  // Remove item from order
  const rm=e.target.closest('[data-remove]');
  if(rm){
    const order=S.orders[S.selectedMesa];
    if(order){
      const idx=parseInt(rm.dataset.remove);
      order.items.splice(idx,1);
      saveOrder(S.selectedMesa);
      renderMesaDetail(S.selectedMesa);
    }
    return;
  }

  // Menu category tabs
  const catTab=e.target.closest('[data-cat]');
  if(catTab){S.menuCat=catTab.dataset.cat;renderMenu();return}

  // Menu add item
  const addItem=e.target.closest('[data-add-item]');
  if(addItem){addItemToOrder(addItem.dataset.addItem);return}

  // Menu back
  if(e.target.id==='btnMenuBack'||e.target.closest('#btnMenuBack')){closeMenu();renderMesaDetail(S.selectedMesa);return}

  // Cobrar back
  if(e.target.id==='btnCobrarBack'||e.target.closest('#btnCobrarBack')){closeCobrar();return}

  // Cobrar options
  const doc=e.target.closest('[data-doc]');
  if(doc){S.cobrar.tipoDoc=doc.dataset.doc;renderCobrar();return}
  const pago=e.target.closest('[data-pago]');
  if(pago){S.cobrar.metodoPago=pago.dataset.pago;renderCobrar();return}
  const prop=e.target.closest('[data-prop]');
  if(prop){S.cobrar.propina=prop.dataset.prop;renderCobrar();return}
  const desc=e.target.closest('[data-desc]');
  if(desc){S.cobrar.descuento=desc.dataset.desc;renderCobrar();return}

  // Por cobrar card click
  const cobrarCard=e.target.closest('[data-cobrar-mesa]');
  if(cobrarCard){openCobrar(cobrarCard.dataset.cobrarMesa);return}

  // Admin filter
  const filter=e.target.closest('[data-filter]');
  if(filter){S.adminFilter=filter.dataset.filter;renderAdmin();return}

  // KDS actions
  const kds=e.target.closest('[data-kds-action]');
  if(kds){
    const mesa=kds.dataset.kdsMesa;
    const order=S.orders[mesa];
    if(!order) return;
    if(kds.dataset.kdsAction==='iniciar'){
      order.comanda_status='cocinando';
      order.items.forEach(i=>i.status='cocinando');
      saveOrder(mesa);renderCocina();
      toast('🔥 Cocinando pedido Mesa '+mesa,'warn');
    }else if(kds.dataset.kdsAction==='listo'){
      order.comanda_status='listo';
      order.items.forEach(i=>i.status='listo');
      saveOrder(mesa);renderCocina();
      toast('✓ Pedido listo — Mesa '+mesa,'ok');
    }else if(kds.dataset.kdsAction==='entregar'){
      order.comanda_status='entregado';
      saveOrder(mesa);renderCocina();
      toast('🍽️ Entregado a Mesa '+mesa,'ok');
    }
    return;
  }

  // CSV export button
  if(e.target.id==='btnCsvExport') exportCSV();

  // Setup buttons
  if(e.target.id==='btnSetupSave'){
    const url=$('setupUrl').value.trim();
    const key=$('setupKey').value.trim();
    if(url&&key){
      localStorage.setItem('bignik_sb',JSON.stringify({url,key}));
      $('setupOverlay').classList.remove('active');
      toast('Supabase configurado — reconecta para activar','ok');
      initSupabase();
    }else{toast('Ingresa URL y Key','warn')}
    return;
  }
  if(e.target.id==='btnSetupSkip'){
    $('setupOverlay').classList.remove('active');
    toast('Modo offline activado','warn');
    return;
  }
});

// Menu search
$('menuSearchInput').addEventListener('input',function(){S.menuSearch=this.value;renderMenu()});

// Cobrar input listeners (delegated)
document.addEventListener('input',function(e){
  if(e.target.id==='propinaInput'){S.cobrar.propinaCustom=parseInt(e.target.value)||0;updateCobrarSummary()}
  if(e.target.id==='descInput'){S.cobrar.descuentoVal=parseInt(e.target.value)||0;updateCobrarSummary()}
  if(e.target.id==='cobrarNota'){S.cobrar.nota=e.target.value}
  if(e.target.id==='mesaNota'&&S.orders[S.selectedMesa]){S.orders[S.selectedMesa].nota=e.target.value}
});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
(async function init(){
  loadLocal();
  await initSupabase();
  // Auto-refresh timers every 30s
  setInterval(()=>{if(S.role) renderCurrentView()},30000);
})();

</script>
