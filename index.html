<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#040404">
<title>BIG NIK — Sistema</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,800;1,300&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#D4A017;--gold2:#F2C94C;--gold3:#7a5a10;--gold4:#2a1c00;
  --blk:#040404;--d1:#080808;--d2:#0f0f0f;--d3:#161616;--d4:#1e1e1e;
  --cream:#F0EAD6;--muted:#5a5a5a;--muted2:#888;
  --green:#1D9E75;--green2:#085041;
  --amber:#BA7517;--amber2:#633806;
  --red:#C0392B;--red2:#7a1212;
  --blue:#1e6fa5;--blue2:#001629;
  --purple:#534AB7;--teal:#0F6E56;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
html,body{width:100%;height:100%;overflow:hidden;background:var(--blk)}
body{font-family:"Barlow Condensed",sans-serif;color:var(--cream);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
button,input,select{-webkit-tap-highlight-color:transparent;font-family:"Barlow Condensed",sans-serif}
input,select{background:var(--d3);border:1px solid #222;color:var(--cream);padding:8px 12px;border-radius:3px;font-size:14px;width:100%}
input:focus,select:focus{outline:none;border-color:var(--gold3)}
::selection{background:var(--gold);color:#000}

/* VIEWS */
.view{position:fixed;inset:0;overflow:hidden;display:none;flex-direction:column}
.view.on{display:flex}

/* ══ LOGIN ══ */
#vLogin{background:var(--blk);align-items:center;justify-content:center;padding:28px 20px;padding-bottom:max(env(safe-area-inset-bottom),28px)}
#vLogin::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 100% 70% at 50% -5%,#1f1500 0%,#0a0800 50%,var(--blk) 100%)}
.login-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;text-align:center;width:100%;max-width:380px}
.login-logo{width:min(200px,55vw);filter:drop-shadow(0 0 50px rgba(212,160,23,.4));margin-bottom:8px}
.login-tag{font-family:"Bebas Neue",sans-serif;font-size:11px;letter-spacing:6px;color:var(--gold3);text-transform:uppercase;margin-bottom:24px}
.login-title{font-family:"Bebas Neue",sans-serif;font-size:clamp(18px,5vw,24px);letter-spacing:3px;color:var(--cream);margin-bottom:20px}
.login-btns{display:flex;flex-direction:column;gap:10px;width:100%}
.role-btn{border:1px solid rgba(212,160,23,.25);background:rgba(255,255,255,.03);padding:16px 20px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:background .2s,border-color .2s;text-align:left}
.role-btn:active{background:rgba(212,160,23,.1);border-color:var(--gold)}
.role-icon{font-size:28px;width:40px;text-align:center;flex-shrink:0}
.role-name{font-family:"Bebas Neue",sans-serif;font-size:22px;letter-spacing:2px;color:var(--cream);display:block}
.role-desc{font-size:12px;color:var(--muted);font-weight:300;display:block;margin-top:1px}

/* ══ TOPBAR ══ */
.topbar{background:rgba(4,4,4,.97);border-bottom:1px solid var(--gold4);padding:max(env(safe-area-inset-top),14px) 16px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:100}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-role{font-family:"Bebas Neue",sans-serif;font-size:14px;letter-spacing:3px;color:var(--gold3)}
.tb-right{display:flex;align-items:center;gap:8px}
.tb-btn{background:none;border:1px solid var(--gold4);padding:5px 12px;cursor:pointer;font-family:"Bebas Neue",sans-serif;font-size:11px;letter-spacing:2px;color:var(--muted);transition:all .2s}
.tb-btn:active{border-color:var(--gold);color:var(--gold)}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}

/* ══ SCROLL ══ */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}

/* ══ TABS ══ */
.tabs{display:flex;background:var(--d1);border-bottom:1px solid #111;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;background:none;border:none;padding:11px 14px;cursor:pointer;font-family:"Bebas Neue",sans-serif;font-size:13px;letter-spacing:2px;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s;position:relative;top:1px;white-space:nowrap}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--red);color:#fff;border-radius:50%;width:15px;height:15px;font-size:9px;margin-left:4px;font-family:"Barlow Condensed",sans-serif;font-weight:700;vertical-align:middle}

/* ══ MESAS ══ */
.salon-block{padding:12px 14px 4px}
.salon-name{font-family:"Bebas Neue",sans-serif;font-size:13px;letter-spacing:4px;color:var(--gold3);text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #111}
.mesas-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.mesa-card{border-radius:6px;border:1.5px solid;padding:12px 14px;cursor:pointer;position:relative;transition:transform .12s;-webkit-tap-highlight-color:transparent}
.mesa-card:active{transform:scale(.97)}
.mesa-card.libre{background:#001a0e;border-color:var(--green2)}
.mesa-card.ocupada{background:#1a0500;border-color:var(--red2)}
.mesa-card.esperando{background:#1a0e00;border-color:var(--amber2)}
.mesa-card.cuenta{background:#0d0b1f;border-color:var(--purple)}
.mesa-card.selected{box-shadow:0 0 0 2px var(--gold)}
.mc-num{font-family:"Bebas Neue",sans-serif;font-size:20px;letter-spacing:1px}
.libre .mc-num{color:var(--green)}.ocupada .mc-num{color:#e05535}.esperando .mc-num{color:var(--amber)}.cuenta .mc-num{color:var(--purple)}
.mc-cap{font-size:11px;color:var(--muted);margin-top:1px}
.mc-timer{font-size:11px;margin-top:4px;font-weight:600}
.libre .mc-timer{color:var(--green2)}.ocupada .mc-timer{color:#e05535}.esperando .mc-timer{color:var(--amber)}.cuenta .mc-timer{color:var(--purple)}
.mc-sillas{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap}
.silla{width:9px;height:9px;border-radius:50%;border:1.5px solid}
.libre .silla{border-color:var(--green2)}.ocupada .silla{border-color:var(--red2)}.ocupada .silla.llena{background:var(--red2)}
.esperando .silla{border-color:var(--amber2)}.esperando .silla.llena{background:var(--amber2)}
.cuenta .silla{border-color:var(--purple)}.cuenta .silla.llena{background:var(--purple)}
.mc-badge{position:absolute;top:7px;right:7px;font-size:9px;font-weight:700;border-radius:10px;padding:1px 7px}
.badge-com{background:var(--amber);color:#000}.badge-lst{background:var(--green);color:#fff}

/* ══ PANEL MESA ══ */
#panelMesa{position:fixed;inset:0;z-index:200;display:none;flex-direction:column;background:var(--blk)}
#panelMesa.on{display:flex}
.pm-header{background:var(--d1);border-bottom:1px solid #111;padding:max(env(safe-area-inset-top),14px) 16px 12px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.pm-back{background:none;border:none;color:var(--cream);font-size:22px;cursor:pointer;padding:4px 8px;margin-left:-8px}
.pm-title{font-family:"Bebas Neue",sans-serif;font-size:20px;letter-spacing:2px;flex:1}
.pm-status-chip{font-size:10px;font-weight:700;border-radius:12px;padding:3px 10px}
.chip-libre{background:#001a0e;color:var(--green);border:1px solid var(--green2)}
.chip-ocupada{background:#1a0500;color:#e05535;border:1px solid var(--red2)}
.chip-esperando{background:#1a0e00;color:var(--amber);border:1px solid var(--amber2)}
.chip-cuenta{background:#0d0b1f;color:var(--purple);border:1px solid var(--purple)}
.pm-section{padding:14px 16px;border-bottom:1px solid #0d0d0d}
.pm-sec-title{font-family:"Bebas Neue",sans-serif;font-size:13px;letter-spacing:3px;color:var(--gold3);margin-bottom:10px}
.order-empty{font-size:13px;color:var(--muted);font-style:italic;padding:4px 0}
.order-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid #0d0d0d}
.order-item:last-child{border-bottom:none}
.oi-qty{font-family:"Bebas Neue",sans-serif;font-size:18px;color:var(--gold);min-width:26px}
.oi-name{flex:1;font-size:14px;font-weight:600}
.oi-note{font-size:11px;color:var(--muted);font-style:italic;margin-top:1px}
.oi-price{font-family:"Bebas Neue",sans-serif;font-size:16px;color:var(--cream);white-space:nowrap}
.oi-est{font-size:10px;border-radius:8px;padding:2px 8px;margin-left:6px;font-weight:700;flex-shrink:0}
.est-prep{background:#1a0e00;color:var(--amber)}.est-listo{background:#001a0e;color:var(--green)}.est-ent{background:#111;color:var(--muted)}
.total-row{display:flex;justify-content:space-between;font-family:"Bebas Neue",sans-serif;font-size:18px;padding-top:10px;border-top:1px solid #111;margin-top:4px}
.total-row span:last-child{color:var(--gold)}
.pm-actions{padding:14px 16px;display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0;background:var(--d1);padding-bottom:max(env(safe-area-inset-bottom),14px)}
.act-btn{flex:1;min-width:90px;border:none;border-radius:4px;padding:12px 8px;font-family:"Bebas Neue",sans-serif;font-size:13px;letter-spacing:1px;cursor:pointer;transition:opacity .15s;min-height:48px}
.act-btn:active{opacity:.75}
.btn-sentar{background:var(--green);color:#fff}
.btn-pedido{background:var(--amber);color:#000}
.btn-comanda{background:var(--red);color:#fff}
.btn-cuenta{background:var(--purple);color:#fff}
.btn-liberar{background:var(--d3);color:var(--cream);border:1px solid #222}
.btn-cobrar{background:var(--gold);color:#000}

/* ══ PANEL PEDIDO ══ */
#panelPedido{position:fixed;inset:0;z-index:300;display:none;flex-direction:column;background:var(--blk)}
#panelPedido.on{display:flex}
.pp-header{background:var(--d1);border-bottom:1px solid #111;padding:max(env(safe-area-inset-top),14px) 16px 10px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.pp-back{background:none;border:none;color:var(--cream);font-size:22px;cursor:pointer;padding:4px 8px;margin-left:-8px}
.pp-title{font-family:"Bebas Neue",sans-serif;font-size:17px;letter-spacing:2px;flex:1}
.pp-total{font-family:"Bebas Neue",sans-serif;font-size:18px;color:var(--gold)}
.pp-cats{display:flex;overflow-x:auto;background:var(--d2);border-bottom:1px solid #111;scrollbar-width:none;flex-shrink:0}
.pp-cats::-webkit-scrollbar{display:none}
.pp-cat{background:none;border:none;padding:10px 14px;font-family:"Bebas Neue",sans-serif;font-size:12px;letter-spacing:2px;color:var(--muted);white-space:nowrap;cursor:pointer;border-bottom:2px solid transparent;position:relative;top:1px;transition:all .18s}
.pp-cat.on{color:var(--gold);border-bottom-color:var(--gold)}
.menu-items{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.menu-item{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #0d0d0d;cursor:pointer;transition:background .15s;gap:10px}
.menu-item:active{background:var(--d2)}
.mi-info{flex:1}
.mi-name{font-size:15px;font-weight:600;color:var(--cream)}
.mi-desc{font-size:11px;color:var(--muted);font-style:italic;margin-top:1px}
.mi-price{font-family:"Bebas Neue",sans-serif;font-size:18px;color:var(--gold);white-space:nowrap}
.mi-add{background:var(--gold);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;color:#000;flex-shrink:0;font-weight:700}
.pp-cart{background:var(--d1);border-top:1px solid #111;padding:10px 16px;padding-bottom:max(env(safe-area-inset-bottom),10px);flex-shrink:0}
.cart-empty{font-size:12px;color:var(--muted);text-align:center;padding:4px 0;font-style:italic}
.cart-items{max-height:130px;overflow-y:auto;margin-bottom:8px}
.cart-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #111}
.cart-row:last-child{border-bottom:none}
.cr-qty-ctrl{display:flex;align-items:center;gap:5px}
.cr-qbtn{background:var(--d3);border:1px solid #222;border-radius:3px;width:24px;height:24px;color:var(--cream);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cr-num{font-family:"Bebas Neue",sans-serif;font-size:16px;color:var(--gold);min-width:18px;text-align:center}
.cr-name{flex:1;font-size:13px;font-weight:600;min-width:0}
.cr-price{font-family:"Bebas Neue",sans-serif;font-size:14px;color:var(--cream)}
.pp-send-btn{width:100%;border:none;background:var(--red);color:#fff;padding:14px;font-family:"Bebas Neue",sans-serif;font-size:16px;letter-spacing:3px;cursor:pointer;border-radius:3px;min-height:50px}
.pp-send-btn:active{opacity:.8}
.pp-send-btn:disabled{background:var(--d3);color:var(--muted)}

/* ══ PANEL COBRO ══ */
#panelCobro{position:fixed;inset:0;z-index:400;display:none;flex-direction:column;background:var(--blk)}
#panelCobro.on{display:flex}
.pc-header{background:var(--d1);border-bottom:1px solid var(--gold4);padding:max(env(safe-area-inset-top),14px) 16px 12px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.pc-back{background:none;border:none;color:var(--cream);font-size:22px;cursor:pointer;padding:4px 8px;margin-left:-8px}
.pc-title{font-family:"Bebas Neue",sans-serif;font-size:18px;letter-spacing:2px;flex:1;color:var(--gold)}
.pc-body{flex:1;overflow-y:auto;padding:16px}
.pc-total-big{font-family:"Bebas Neue",sans-serif;font-size:clamp(42px,12vw,72px);color:var(--gold);letter-spacing:2px;text-align:center;margin-bottom:4px}
.pc-mesa-lbl{text-align:center;font-size:12px;letter-spacing:3px;color:var(--muted);margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-label{font-family:"Bebas Neue",sans-serif;font-size:12px;letter-spacing:3px;color:var(--gold3);display:block;margin-bottom:5px}
.tipo-btns{display:flex;gap:6px}
.tipo-btn{flex:1;background:var(--d3);border:1.5px solid #222;padding:10px 6px;font-family:"Bebas Neue",sans-serif;font-size:13px;letter-spacing:2px;color:var(--muted);cursor:pointer;border-radius:3px;transition:all .18s;text-align:center}
.tipo-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(212,160,23,.08)}
.propina-presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.prop-btn{flex:1;min-width:55px;background:var(--d3);border:1.5px solid #222;padding:8px 4px;font-family:"Bebas Neue",sans-serif;font-size:13px;letter-spacing:1px;color:var(--muted);cursor:pointer;border-radius:3px;transition:all .18s;text-align:center}
.prop-btn.on{border-color:var(--green);color:var(--green);background:rgba(29,158,117,.08)}
.pc-resumen{background:var(--d2);border:1px solid #1e1e1e;border-radius:4px;padding:14px;margin-top:16px}
.pc-res-row{display:flex;justify-content:space-between;font-size:14px;padding:4px 0;border-bottom:1px solid #111}
.pc-res-row:last-child{border-bottom:none;font-family:"Bebas Neue",sans-serif;font-size:18px;color:var(--gold);padding-top:8px}
.pc-confirmar{width:100%;border:none;background:var(--green);color:#fff;padding:16px;font-family:"Bebas Neue",sans-serif;font-size:16px;letter-spacing:3px;cursor:pointer;border-radius:3px;min-height:52px;margin-top:16px}
.pc-confirmar:active{opacity:.8}

/* ══ COMANDAS GARZÓN ══ */
.comanda-card{background:var(--d2);border-radius:6px;margin-bottom:8px;overflow:hidden}
.cc-head{padding:8px 12px;display:flex;justify-content:space-between;align-items:center}
.cc-items{padding:8px 12px}
.cc-foot{padding:0 12px 10px}

/* ══ KDS ══ */
.kds-stats{background:var(--d1);border-bottom:1px solid #111;padding:8px 16px;display:flex;gap:16px;align-items:center;flex-shrink:0}
.kstat{display:flex;flex-direction:column;align-items:center;min-width:44px}
.kstat-num{font-family:"Bebas Neue",sans-serif;font-size:22px;line-height:1}
.kstat-lbl{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:1px}
.kstat-num.new{color:var(--amber)}.kstat-num.prep{color:var(--blue)}.kstat-num.done{color:var(--green)}
.tickets-wrap{padding:10px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;align-content:start}
.ticket{border-radius:6px;border:2px solid;overflow:hidden}
.ticket.nueva{border-color:var(--amber);background:#110900}
.ticket.prep{border-color:var(--blue);background:#000b14}
.ticket.lista{border-color:var(--green);background:#001209}
.tk-head{padding:8px 10px;display:flex;justify-content:space-between;align-items:flex-start}
.ticket.nueva .tk-head{background:#1a0e00}.ticket.prep .tk-head{background:#001629}.ticket.lista .tk-head{background:#001a0e}
.tk-mesa{font-family:"Bebas Neue",sans-serif;font-size:18px;letter-spacing:1px}
.ticket.nueva .tk-mesa{color:var(--amber)}.ticket.prep .tk-mesa{color:#4db8f5}.ticket.lista .tk-mesa{color:var(--green)}
.tk-timer{font-size:11px;font-weight:700;border-radius:8px;padding:2px 7px}
.ticket.nueva .tk-timer{background:var(--amber);color:#000}.ticket.prep .tk-timer{background:var(--blue);color:#fff}.ticket.lista .tk-timer{background:var(--green);color:#fff}
.tk-salon{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:1px}
.tk-items{padding:8px 10px}
.tk-item{display:flex;gap:6px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
.tk-item:last-child{border-bottom:none}
.tk-iqty{font-family:"Bebas Neue",sans-serif;font-size:14px;min-width:20px}
.ticket.nueva .tk-iqty{color:var(--amber)}.ticket.prep .tk-iqty{color:#4db8f5}.ticket.lista .tk-iqty{color:var(--green)}
.tk-iname{flex:1;color:var(--cream)}.tk-inote{font-size:10px;color:var(--muted);font-style:italic;margin-top:1px}
.tk-foot{padding:6px 10px}
.tk-btn{width:100%;border:none;border-radius:3px;padding:9px;font-family:"Bebas Neue",sans-serif;font-size:12px;letter-spacing:2px;cursor:pointer;min-height:40px}
.tk-btn:active{opacity:.75}
.ticket.nueva .tk-btn{background:var(--amber);color:#000}.ticket.prep .tk-btn{background:var(--green);color:#fff}.ticket.lista .tk-btn{background:var(--purple);color:#fff}
.kds-empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;font-style:italic}

/* ══ REPORTES ══ */
.rpt-section{padding:14px 16px;border-bottom:1px solid #0d0d0d}
.rpt-title{font-family:"Bebas Neue",sans-serif;font-size:16px;letter-spacing:3px;color:var(--gold3);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.period-btns{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.period-btn{background:var(--d3);border:1px solid #222;padding:7px 12px;font-family:"Bebas Neue",sans-serif;font-size:11px;letter-spacing:2px;color:var(--muted);cursor:pointer;border-radius:3px;transition:all .18s}
.period-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(212,160,23,.07)}
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.kpi-card{background:var(--d2);border:1px solid #1a1a1a;border-radius:4px;padding:12px 14px}
.kpi-lbl{font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:4px}
.kpi-val{font-family:"Bebas Neue",sans-serif;font-size:clamp(20px,6vw,32px);letter-spacing:1px}
.kpi-val.gold{color:var(--gold)}.kpi-val.green{color:var(--green)}.kpi-val.amber{color:var(--amber)}.kpi-val.blue{color:#4db8f5}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:2px}
.ventas-list{display:flex;flex-direction:column;gap:2px}
.venta-row{background:var(--d2);border:1px solid #111;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;border-radius:3px}
.vr-fecha{font-size:11px;color:var(--muted)}
.vr-mesa{font-family:"Bebas Neue",sans-serif;font-size:13px;letter-spacing:1px;color:var(--cream)}
.vr-tipo{font-size:10px;border-radius:8px;padding:2px 7px;font-weight:700}
.tipo-boleta{background:#001a0e;color:var(--green);border:1px solid var(--green2)}
.tipo-factura{background:#001629;color:#4db8f5;border:1px solid var(--blue)}
.tipo-exenta{background:#1a0e00;color:var(--amber);border:1px solid var(--amber2)}
.vr-total{font-family:"Bebas Neue",sans-serif;font-size:16px;color:var(--gold)}
.items-rank{display:flex;flex-direction:column;gap:3px}
.ir-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--d2);border-radius:3px;border:1px solid #111}
.ir-rank{font-family:"Bebas Neue",sans-serif;font-size:18px;color:var(--gold3);min-width:24px}
.ir-name{flex:1;font-size:14px;font-weight:600}
.ir-bar-wrap{width:60px;height:6px;background:var(--d3);border-radius:3px;overflow:hidden}
.ir-bar{height:100%;background:var(--gold);border-radius:3px}
.ir-qty{font-family:"Bebas Neue",sans-serif;font-size:14px;color:var(--amber);min-width:30px;text-align:right}
.ir-total{font-family:"Bebas Neue",sans-serif;font-size:13px;color:var(--muted);min-width:55px;text-align:right}

/* TOAST */
#toast{position:fixed;bottom:max(env(safe-area-inset-bottom),24px);left:50%;transform:translateX(-50%);z-index:9999;border-radius:8px;padding:10px 20px;font-family:"Bebas Neue",sans-serif;font-size:15px;letter-spacing:2px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .3s}
#toast.show{opacity:1}

/* CONFIRM */
#confirmModal{position:fixed;inset:0;z-index:9990;display:none;background:rgba(4,4,4,.85);align-items:center;justify-content:center;padding:20px}
#confirmModal.on{display:flex}
.cm-box{background:var(--d2);border:1px solid #222;padding:22px;max-width:320px;width:100%;border-radius:4px}
.cm-title{font-family:"Bebas Neue",sans-serif;font-size:20px;letter-spacing:2px;margin-bottom:8px}
.cm-msg{font-size:13px;color:var(--muted2);margin-bottom:20px;line-height:1.5}
.cm-btns{display:flex;gap:8px}
.cm-cancel{flex:1;background:var(--d3);border:1px solid #222;padding:12px;color:var(--muted2);font-family:"Bebas Neue",sans-serif;font-size:14px;letter-spacing:2px;cursor:pointer;border-radius:3px}
.cm-ok{flex:1;border:none;padding:12px;color:#fff;font-family:"Bebas Neue",sans-serif;font-size:14px;letter-spacing:2px;cursor:pointer;border-radius:3px}
</style>
</head>

  {id:"B3",salon:"Bar",cap:4},{id:"B4",salon:"Bar",cap:4},
  {id:"P1",salon:"Patio Rojo",cap:4},{id:"P2",salon:"Patio Rojo",cap:4},
  {id:"P3",salon:"Patio Rojo",cap:4},{id:"P4",salon:"Patio Rojo",cap:4},
  {id:"P5",salon:"Patio Rojo",cap:6},{id:"P6",salon:"Patio Rojo",cap:6},
];

const CH=typeof BroadcastChannel!=="undefined"?new BroadcastChannel("bignik"):null;

function getState(){try{return JSON.parse(localStorage.getItem("bignik_state")||"null")}catch(e){return null}}
function saveState(s){localStorage.setItem("bignik_state",JSON.stringify(s));if(CH)CH.postMessage({type:"update"})}

function initState(){
  const s=getState();
  if(s&&s.ventas)return s;
  const mesas={};
  MESAS_DEF.forEach(m=>{mesas[m.id]={id:m.id,salon:m.salon,cap:m.cap,estado:"libre",personas:0,timer:0,pedidos:[],comandaEnviada:false}});
  // demo
  mesas["B1"].estado="ocupada";mesas["B1"].personas=3;mesas["B1"].timer=18;
  mesas["B1"].pedidos=[{id:1,name:"Q Pounder Doble",price:8000,qty:2,est:"listo",note:""},
                       {id:2,name:"Papas French",price:5500,qty:2,est:"listo",note:""},
                       {id:3,name:"Coca-Cola",price:2500,qty:2,est:"ent",note:""}];
  mesas["B1"].comandaEnviada=true;
  mesas["P2"].estado="esperando";mesas["P2"].personas=4;mesas["P2"].timer=5;
  const state={
    mesas,
    comandas:[{id:1,mesa:"B1",salon:"Bar",status:"lista",timer:18,items:[{name:"Q Pounder Doble",qty:2,note:""},{name:"Papas French",qty:2,note:""}]}],
    ventas:[
      {id:1,mesa:"P5",salon:"Patio Rojo",fecha:hoy(),hora:"13:45",subtotal:42000,propina:4200,total:46200,tipo:"boleta",pago:"efectivo",items:[{name:"Big Nik Doble",qty:4,price:8000},{name:"Heineken",qty:4,price:3500}]},
      {id:2,mesa:"B3",salon:"Bar",fecha:hoy(),hora:"14:20",subtotal:18500,propina:0,total:18500,tipo:"factura",pago:"debito",items:[{name:"Q Pounder Simple",qty:2,price:6500},{name:"Papas Lays",qty:2,price:2500}]},
      {id:3,mesa:"P1",salon:"Patio Rojo",fecha:ayer(),hora:"20:10",subtotal:31500,propina:3000,total:34500,tipo:"boleta",pago:"credito",items:[{name:"Fried Onion Doble",qty:3,price:9900},{name:"Escudo",qty:3,price:3500},{name:"Agua Sin Gas",qty:2,price:2000}]},
    ],
    nextId:100,
  };
  saveState(state);
  return state;
}

function hoy(){return new Date().toISOString().slice(0,10)}
function ayer(){const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().slice(0,10)}
function semanaAtras(){const d=new Date();d.setDate(d.getDate()-7);return d.toISOString().slice(0,10)}
function mesAtras(){const d=new Date();d.setMonth(d.getMonth()-1);return d.toISOString().slice(0,10)}
function fechaLocal(iso){if(!iso)return"—";const[y,m,d]=iso.split("-");return`${d}/${m}/${y}`}

let S=initState();
let role=null,currentMesa=null,cartItems=[],menuCatIdx=0,activeTab="mesas";
let timerInterval=null,reportPeriod="dia";
// cobro state
let cobroTipo="boleta",cobroPago="efectivo",cobroPropinaMode=0;

if(CH)CH.onmessage=()=>{S=getState()||S;if(role==="cocina")renderKDS();if(role==="garzon")renderGarzon();if(role==="admin")renderAdmin();};

const fmt=n=>"$"+Number(n).toLocaleString("es-CL");
const fmt2=n=>Number(n).toLocaleString("es-CL");

function showToast(msg,color="#1D9E75"){
  const t=document.getElementById("toast");
  t.textContent=msg;t.style.background=color;
  t.classList.add("show");clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove("show"),2400);
}
function confirmDlg(title,msg,color,cb){
  document.getElementById("cmTitle").textContent=title;
  document.getElementById("cmMsg").textContent=msg;
  const ok=document.getElementById("cmOk");
  ok.style.background=color;ok.onclick=()=>{closeConfirm();cb()};
  document.getElementById("confirmModal").classList.add("on");
}
function closeConfirm(){document.getElementById("confirmModal").classList.remove("on")}

function setRole(r){
  role=r;
  document.getElementById("vLogin").classList.toggle("on",!r);
  document.getElementById("vGarzon").classList.toggle("on",r==="garzon");
  document.getElementById("vCocina").classList.toggle("on",r==="cocina");
  document.getElementById("vAdmin").classList.toggle("on",r==="admin");
  if(r==="garzon"){activeTab="mesas";renderGarzon();startTimer()}
  if(r==="cocina"){renderKDS();startTimer()}
  if(r==="admin"){renderAdmin()}
  if(!r)stopTimer();
}

function startTimer(){
  stopTimer();
  timerInterval=setInterval(()=>{
    Object.values(S.mesas).forEach(m=>{if(m.estado!=="libre")m.timer=(m.timer||0)+1});
    S.comandas.forEach(c=>{if(c.status!=="entregada")c.timer=(c.timer||0)+1});
    saveState(S);
    if(role==="garzon")renderGarzon();
    if(role==="cocina")renderKDS();
  },60000);
}
function stopTimer(){clearInterval(timerInterval)}

// GARZÓN
// ══════════════════════════
function switchTab(t){
  activeTab=t;
  ["mesas","comandas","cobros"].forEach(x=>document.getElementById("tab"+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle("on",x===t));
  renderGarzon();
}

function renderGarzon(){
  const el=document.getElementById("garzonContent");
  if(activeTab==="mesas")el.innerHTML=renderMesasHTML();
  else if(activeTab==="comandas")el.innerHTML=renderMisComandasHTML();
  else el.innerHTML=renderPorCobrarHTML();
  updateBadges();
}

function renderMesasHTML(){
  return["Bar","Patio Rojo"].map(s=>{
    const mesas=Object.values(S.mesas).filter(m=>m.salon===s);
    return`<div class="salon-block"><div class="salon-name">${s==="Bar"?"🍺 Bar":"🌿 Patio Rojo"}</div>
    <div class="mesas-grid">${mesas.map(mesaCardHTML).join("")}</div></div>`;
  }).join("");
}

function mesaCardHTML(m){
  const sillas=Array.from({length:m.cap},(_,i)=>`<div class="silla${i<m.personas?" llena":""}"></div>`).join("");
  const badge=m.comandaEnviada&&m.estado==="ocupada"?`<span class="mc-badge badge-com">Comanda</span>`:"";
  const timer=m.timer?`<div class="mc-timer">⏱ ${m.timer} min</div>`:"";
  const lbl={libre:"Libre",ocupada:"Ocupada",esperando:"Esperando",cuenta:"Cuenta"}[m.estado];
  return`<div class="mesa-card ${m.estado}" onclick="openMesa('${m.id}')">
    ${badge}<div class="mc-num">Mesa ${m.id}</div>
    <div class="mc-cap">${m.cap} pers · ${lbl}</div>
    ${timer}<div class="mc-sillas">${sillas}</div></div>`;
}

function renderMisComandasHTML(){
  const activas=S.comandas.filter(c=>c.status!=="entregada");
  if(!activas.length)return`<div style="padding:40px 20px;text-align:center;color:var(--muted);font-style:italic">Sin comandas activas</div>`;
  return`<div style="padding:10px">${activas.map(c=>{
    const color={nueva:"var(--amber)",prep:"var(--blue)",lista:"var(--green)"}[c.status];
    const lbl={nueva:"Nueva",prep:"Preparando",lista:"¡Lista! 🔔"}[c.status];
    const items=c.items.map(i=>`<div style="font-size:13px;padding:3px 0;border-bottom:1px solid #111">${i.qty}× ${i.name}${i.note?` <em style="color:var(--muted);font-size:11px">(${i.note})</em>`:""}</div>`).join("");
    return`<div class="comanda-card" style="border:1.5px solid ${color}">
      <div class="cc-head" style="background:var(--d3)">
        <div><span style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:${color}">Mesa ${c.mesa}</span>
          <span style="font-size:10px;color:var(--muted);margin-left:8px">${c.salon}</span></div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;font-weight:700;background:${color};color:${c.status==="nueva"?"#000":"#fff"};border-radius:8px;padding:2px 8px">${lbl}</span>
          <span style="font-size:11px;color:var(--muted)">⏱ ${c.timer} min</span>
        </div>
      </div>
      <div class="cc-items">${items}</div>
      ${c.status==="lista"?`<div class="cc-foot"><button onclick="marcarEntregada(${c.id})" style="width:100%;border:none;background:var(--green);color:#fff;padding:10px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;cursor:pointer;border-radius:3px">✓ Marcar entregada</button></div>`:""}
    </div>`;
  }).join("")}</div>`;
}

function renderPorCobrarHTML(){
  const mesas=Object.values(S.mesas).filter(m=>m.estado==="cuenta");
  if(!mesas.length)return`<div style="padding:40px 20px;text-align:center;color:var(--muted);font-style:italic">Sin mesas pendientes de cobro</div>`;
  return`<div style="padding:10px">${mesas.map(m=>{
    const total=m.pedidos.reduce((a,p)=>a+p.price*p.qty,0);
    const items=m.pedidos.map(p=>`<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0;border-bottom:1px solid #0d0d0d">
      <span>${p.qty}× ${p.name}</span><span style="font-family:'Bebas Neue',sans-serif;color:var(--gold)">${fmt(p.price*p.qty)}</span></div>`).join("");
    return`<div style="background:var(--d2);border:1.5px solid var(--purple);border-radius:6px;margin-bottom:10px;overflow:hidden">
      <div style="background:var(--d3);padding:10px 14px;display:flex;justify-content:space-between;align-items:center">
        <div><span style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--purple)">Mesa ${m.id}</span>
          <span style="font-size:10px;color:var(--muted);margin-left:8px">${m.salon} · ⏱ ${m.timer} min</span></div>
        <span style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold)">${fmt(total)}</span>
      </div>
      <div style="padding:10px 14px">${items}</div>
      <div style="padding:0 14px 12px">
        <button onclick="openCobro('${m.id}')" style="width:100%;border:none;background:var(--gold);color:#000;padding:12px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:3px;cursor:pointer;border-radius:3px;min-height:48px">
          💳 COBRAR ${fmt(total)}
        </button>
      </div>
    </div>`;
  }).join("")}</div>`;
}

function updateBadges(){
  const bm=document.getElementById("badgeMesas");
  const bc=document.getElementById("badgeComandas");
  const bcb=document.getElementById("badgeCobros");
  const pendEsp=Object.values(S.mesas).filter(m=>m.estado==="esperando").length;
  const pendLst=S.comandas.filter(c=>c.status==="lista").length;
  const pendCob=Object.values(S.mesas).filter(m=>m.estado==="cuenta").length;
  if(bm){bm.style.display=pendEsp?"inline-flex":"none";bm.textContent=pendEsp}
  if(bc){bc.style.display=pendLst?"inline-flex":"none";bc.textContent=pendLst}
  if(bcb){bcb.style.display=pendCob?"inline-flex":"none";bcb.textContent=pendCob}
}

// ── PANEL MESA ──
function openMesa(id){
  currentMesa=id;const m=S.mesas[id];
  document.getElementById("pmTitle").textContent=`Mesa ${id} — ${m.salon}`;
  const chips={libre:"chip-libre",ocupada:"chip-ocupada",esperando:"chip-esperando",cuenta:"chip-cuenta"};
  const chipTxt={libre:"Libre",ocupada:"Ocupada",esperando:"Esperando pedido",cuenta:"Pidiendo cuenta"};
  const chip=document.getElementById("pmChip");
  chip.className="pm-status-chip "+chips[m.estado];chip.textContent=chipTxt[m.estado];
  renderPanelMesaBody(m);renderPanelMesaActions(m);
  document.getElementById("panelMesa").classList.add("on");
}
function closePanelMesa(){document.getElementById("panelMesa").classList.remove("on")}

function renderPanelMesaBody(m){
  let html=`<div class="pm-section"><div class="pm-sec-title">Info</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <span style="background:var(--d3);padding:4px 12px;font-size:12px;border-radius:3px">👥 ${m.personas}/${m.cap}</span>
      ${m.timer?`<span style="background:var(--d3);padding:4px 12px;font-size:12px;border-radius:3px">⏱ ${m.timer} min</span>`:""}
    </div></div>`;
  if(m.pedidos&&m.pedidos.length){
    const total=m.pedidos.reduce((a,p)=>a+p.price*p.qty,0);
    html+=`<div class="pm-section"><div class="pm-sec-title">Pedido actual</div>
      ${m.pedidos.map(p=>`<div class="order-item">
        <div class="oi-qty">${p.qty}×</div>
        <div style="flex:1"><div class="oi-name">${p.name}</div>${p.note?`<div class="oi-note">📝 ${p.note}</div>`:""}</div>
        <div class="oi-price">${fmt(p.price*p.qty)}</div>
        <span class="oi-est est-${p.est}">${{prep:"Preparando",listo:"Listo",ent:"Entregado"}[p.est]||p.est}</span>
      </div>`).join("")}
      <div class="total-row"><span>Total</span><span>${fmt(total)}</span></div>
    </div>`;
  }else{
    html+=`<div class="pm-section"><div class="pm-sec-title">Pedido actual</div><div class="order-empty">Sin pedidos aún</div></div>`;
  }
  document.getElementById("pmBody").innerHTML=html;
}

function renderPanelMesaActions(m){
  let btns="";
  if(m.estado==="libre")btns+=`<button class="act-btn btn-sentar" onclick="sentarClientes()">👥 Sentar</button>`;
  if(m.estado==="ocupada"||m.estado==="esperando"){
    btns+=`<button class="act-btn btn-pedido" onclick="openPedido()">🛒 Pedido</button>`;
    if(m.pedidos&&m.pedidos.length&&!m.comandaEnviada)
      btns+=`<button class="act-btn btn-comanda" onclick="enviarComanda()">🍳 Comanda</button>`;
    if(m.pedidos&&m.pedidos.length)
      btns+=`<button class="act-btn btn-cuenta" onclick="pedirCuenta()">💳 Cuenta</button>`;
  }
  if(m.estado==="cuenta")btns+=`<button class="act-btn btn-cobrar" onclick="openCobro('${m.id}')">💰 Cobrar</button>`;
  if(m.estado!=="libre")btns+=`<button class="act-btn btn-liberar" onclick="liberarMesa()">🗑 Liberar</button>`;
  document.getElementById("pmActions").innerHTML=btns;
}

function sentarClientes(){const m=S.mesas[currentMesa];m.estado="esperando";m.personas=1;m.timer=0;saveState(S);openMesa(currentMesa);showToast("Clientes sentados ✓")}
function pedirCuenta(){S.mesas[currentMesa].estado="cuenta";saveState(S);openMesa(currentMesa);showToast("Cuenta solicitada 💳","#534AB7")}
function liberarMesa(){
  confirmDlg("Liberar Mesa","¿Mesa pagada y lista?","var(--green)",()=>{
    const m=S.mesas[currentMesa];
    m.estado="libre";m.personas=0;m.timer=0;m.pedidos=[];m.comandaEnviada=false;
    S.comandas=S.comandas.filter(c=>c.mesa!==currentMesa);
    saveState(S);closePanelMesa();renderGarzon();showToast("Mesa liberada ✓");
  });
}
function enviarComanda(){
  const m=S.mesas[currentMesa];
  const pend=m.pedidos.filter(p=>p.est==="prep");
  if(!pend.length){showToast("Sin items nuevos","var(--amber)");return}
  S.comandas.push({id:S.nextId++,mesa:currentMesa,salon:m.salon,status:"nueva",timer:0,items:pend.map(p=>({name:p.name,qty:p.qty,note:p.note||""}))});
  m.comandaEnviada=true;m.estado="ocupada";
  saveState(S);openMesa(currentMesa);renderGarzon();showToast("¡Comanda enviada! 🍳","var(--amber)");
}
function marcarEntregada(id){
  const c=S.comandas.find(x=>x.id===id);
  if(c){c.status="entregada";const m=S.mesas[c.mesa];if(m)m.pedidos.forEach(p=>{if(p.est==="listo"||p.est==="prep")p.est="ent"});
  saveState(S);renderGarzon();showToast("Entregado ✓")}
}

// ── PANEL PEDIDO ──
function openPedido(){cartItems=[];menuCatIdx=0;renderPedidoPanel();document.getElementById("panelPedido").classList.add("on")}
function closePanelPedido(){document.getElementById("panelPedido").classList.remove("on")}
function renderPedidoPanel(){
  document.getElementById("ppTitle").textContent=`Mesa ${currentMesa}`;
  document.getElementById("ppCats").innerHTML=MENU.map((c,i)=>`<button class="pp-cat${i===menuCatIdx?" on":""}" onclick="selectCat(${i})">${c.cat}</button>`).join("");
  renderMenuItems();renderCart();
}
function selectCat(i){menuCatIdx=i;document.querySelectorAll(".pp-cat").forEach((b,j)=>b.classList.toggle("on",j===i));renderMenuItems()}
function renderMenuItems(){
  const cat=MENU[menuCatIdx];
  document.getElementById("ppItems").innerHTML=cat.items.map(item=>{
    if(item.var)return item.var.map(v=>`<div class="menu-item" onclick="addToCart('${item.id}_${v.l}','${item.name} ${v.l}',${v.p})">
      <div class="mi-info"><div class="mi-name">${item.name} <span style="color:var(--gold3);font-size:12px">${v.l}</span></div>${item.desc?`<div class="mi-desc">${item.desc}</div>`:""}</div>
      <div class="mi-price">${fmt(v.p)}</div>
      <button class="mi-add" onclick="event.stopPropagation();addToCart('${item.id}_${v.l}','${item.name} ${v.l}',${v.p})">+</button></div>`).join("");
    return`<div class="menu-item" onclick="addToCart('${item.id}','${item.name}',${item.price})">
      <div class="mi-info"><div class="mi-name">${item.name}</div>${item.desc?`<div class="mi-desc">${item.desc}</div>`:""}</div>
      <div class="mi-price">${fmt(item.price)}</div>
      <button class="mi-add" onclick="event.stopPropagation();addToCart('${item.id}','${item.name}',${item.price})">+</button></div>`;
  }).join("");
}
function addToCart(id,name,price){
  const ex=cartItems.find(c=>c.id===id);
  if(ex)ex.qty++;else cartItems.push({id,name,price,qty:1,note:""});
  renderCart();showToast("+ "+name,"#BA7517");
}
function renderCart(){
  const total=cartItems.reduce((a,c)=>a+c.price*c.qty,0);
  document.getElementById("ppTotal").textContent=fmt(total);
  const el=document.getElementById("ppCart");
  if(!cartItems.length){el.innerHTML=`<div class="cart-empty">Agrega ítems desde el menú</div><button class="pp-send-btn" disabled>Agregar al pedido</button>`;return}
  el.innerHTML=`<div class="cart-items">${cartItems.map((c,i)=>`
    <div class="cart-row">
      <div class="cr-qty-ctrl">
        <button class="cr-qbtn" onclick="changeQty(${i},-1)">−</button>
        <span class="cr-num">${c.qty}</span>
        <button class="cr-qbtn" onclick="changeQty(${i},1)">+</button>
      </div>
      <div style="flex:1;min-width:0">
        <div class="cr-name">${c.name}</div>
        <input placeholder="Nota..." value="${c.note}" oninput="cartItems[${i}].note=this.value" style="margin-top:3px;font-size:11px;padding:3px 8px">
      </div>
      <div class="cr-price">${fmt(c.price*c.qty)}</div>
    </div>`).join("")}</div>
  <button class="pp-send-btn" onclick="confirmarPedido()">Agregar al pedido · ${fmt(total)}</button>`;
}
function changeQty(i,d){cartItems[i].qty+=d;if(cartItems[i].qty<=0)cartItems.splice(i,1);renderCart()}
function confirmarPedido(){
  if(!cartItems.length)return;
  const m=S.mesas[currentMesa];
  cartItems.forEach(c=>m.pedidos.push({id:S.nextId++,name:c.name,price:c.price,qty:c.qty,est:"prep",note:c.note}));
  m.estado="ocupada";m.comandaEnviada=false;
  saveState(S);closePanelPedido();openMesa(currentMesa);showToast("Pedido agregado ✓");
}

// ══════════════════════════
function openCobro(id){
  currentMesa=id;const m=S.mesas[id];
  const total=m.pedidos.reduce((a,p)=>a+p.price*p.qty,0);
  document.getElementById("pcTotalBig").textContent=fmt(total);
  document.getElementById("pcMesaLbl").textContent=`Mesa ${id} · ${m.salon}`;
  cobroTipo="boleta";cobroPago="efectivo";cobroPropinaMode=0;
  document.getElementById("propinaInput").style.display="none";
  document.getElementById("propinaInput").value="";
  document.getElementById("cobroNotas").value="";
  // reset btns
  ["boleta","factura","exenta"].forEach(t=>document.getElementById("tipo-"+t).classList.toggle("on",t===cobroTipo));
  ["efectivo","debito","credito","transfer"].forEach(t=>document.getElementById("pago-"+t).classList.toggle("on",t===cobroPago));
  ["0","10","custom"].forEach(t=>document.getElementById("prop-"+t).classList.toggle("on",t==="0"));
  calcResumen();
  document.getElementById("panelMesa").classList.remove("on");
  document.getElementById("panelCobro").classList.add("on");
}
function closePanelCobro(){document.getElementById("panelCobro").classList.remove("on");if(currentMesa)openMesa(currentMesa)}
function setTipo(t){cobroTipo=t;["boleta","factura","exenta"].forEach(x=>document.getElementById("tipo-"+x).classList.toggle("on",x===t))}
function setPago(t){cobroPago=t;["efectivo","debito","credito","transfer"].forEach(x=>document.getElementById("pago-"+x).classList.toggle("on",x===t))}
function setPropina(v){
  cobroPropinaMode=v;
  ["0","10","custom"].forEach(x=>document.getElementById("prop-"+x).classList.toggle("on",x===String(v)));
  document.getElementById("propinaInput").style.display=v==="custom"?"block":"none";
  if(v!=="custom")document.getElementById("propinaInput").value="";
  calcResumen();
}
function calcResumen(){
  const m=S.mesas[currentMesa];
  if(!m)return;
  const subtotal=m.pedidos.reduce((a,p)=>a+p.price*p.qty,0);
  let propina=0;
  if(cobroPropinaMode===10)propina=Math.round(subtotal*0.1);
  else if(cobroPropinaMode==="custom"){
    const v=parseInt(document.getElementById("propinaInput").value)||0;
    propina=v;
  }
  const total=subtotal+propina;
  const tipoLbl={boleta:"Boleta",factura:"Factura",exenta:"B. Exenta"}[cobroTipo];
  const pagoLbl={efectivo:"Efectivo",debito:"Débito",credito:"Crédito",transfer:"Transferencia"}[cobroPago];
  document.getElementById("pcResumen").innerHTML=`
    <div class="pc-res-row"><span>Subtotal</span><span style="font-family:'Bebas Neue',sans-serif;color:var(--cream)">${fmt(subtotal)}</span></div>
    <div class="pc-res-row"><span>Propina</span><span style="font-family:'Bebas Neue',sans-serif;color:var(--green)">${fmt(propina)}</span></div>
    <div class="pc-res-row"><span>Documento</span><span style="color:var(--muted2)">${tipoLbl}</span></div>
    <div class="pc-res-row"><span>Pago</span><span style="color:var(--muted2)">${pagoLbl}</span></div>
    <div class="pc-res-row"><span>TOTAL</span><span>${fmt(total)}</span></div>
  `;
}
function confirmarCobro(){
  const m=S.mesas[currentMesa];
  if(!m||!m.pedidos.length){showToast("Sin pedidos","var(--red)");return}
  const subtotal=m.pedidos.reduce((a,p)=>a+p.price*p.qty,0);
  let propina=0;
  if(cobroPropinaMode===10)propina=Math.round(subtotal*0.1);
  else if(cobroPropinaMode==="custom")propina=parseInt(document.getElementById("propinaInput").value)||0;
  const total=subtotal+propina;
  const notas=document.getElementById("cobroNotas").value;
  const venta={
    id:S.nextId++,
    mesa:currentMesa,salon:m.salon,
    fecha:hoy(),hora:new Date().toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"}),
    subtotal,propina,total,
    tipo:cobroTipo,pago:cobroPago,notas,
    items:m.pedidos.map(p=>({name:p.name,qty:p.qty,price:p.price}))
  };
  S.ventas.push(venta);
  // Liberar mesa
  m.estado="libre";m.personas=0;m.timer=0;m.pedidos=[];m.comandaEnviada=false;
  S.comandas=S.comandas.filter(c=>c.mesa!==currentMesa);
  saveState(S);
  document.getElementById("panelCobro").classList.remove("on");
  closePanelMesa();
  renderGarzon();
  showToast(`✓ Cobrado ${fmt(total)} — ${cobroTipo}`,"var(--green)");
}

// ══════════════════════════
// KDS
// ══════════════════════════
function renderKDS(){
  const act=S.comandas.filter(c=>c.status!=="entregada");
  const nN=act.filter(c=>c.status==="nueva").length;
  const nP=act.filter(c=>c.status==="prep").length;
  const nD=act.filter(c=>c.status==="lista").length;
  document.getElementById("kdsStats").innerHTML=`
    <div class="kstat"><span class="kstat-num new">${nN}</span><span class="kstat-lbl">Nuevas</span></div>
    <div class="kstat"><span class="kstat-num prep">${nP}</span><span class="kstat-lbl">Prep.</span></div>
    <div class="kstat"><span class="kstat-num done">${nD}</span><span class="kstat-lbl">Listas</span></div>
    <div style="flex:1;text-align:right"><div class="pulse" style="display:inline-block;margin-right:4px"></div><span style="font-size:10px;color:var(--muted)">En vivo</span></div>`;
  const el=document.getElementById("kdsContent");
  const sorted=[...act].sort((a,b)=>({nueva:0,prep:1,lista:2}[a.status]-{nueva:0,prep:1,lista:2}[b.status]));
  if(!sorted.length){el.innerHTML=`<div class="kds-empty">Sin comandas 🎉<br><span style="font-size:11px">Todo al día</span></div>`;return}
  el.innerHTML=`<div class="tickets-wrap">${sorted.map(c=>{
    const btnTxt={nueva:"▶ Iniciar",prep:"✓ Listo",lista:"🍽 Entregar"}[c.status];
    const items=c.items.map(i=>`<div class="tk-item"><div class="tk-iqty">${i.qty}</div><div><div class="tk-iname">${i.name}</div>${i.note?`<div class="tk-inote">📝 ${i.note}</div>`:""}</div></div>`).join("");
    return`<div class="ticket ${c.status}">
      <div class="tk-head"><div><div class="tk-mesa">Mesa ${c.mesa}</div><div class="tk-salon">${c.salon}</div></div>
      <span class="tk-timer">⏱ ${c.timer} min</span></div>
      <div class="tk-items">${items}</div>
      <div class="tk-foot"><button class="tk-btn" onclick="avanzarComanda(${c.id})">${btnTxt}</button></div>
    </div>`;
  }).join("")}</div>`;
}
function avanzarComanda(id){
  const c=S.comandas.find(x=>x.id===id);if(!c)return;
  if(c.status==="nueva"){c.status="prep";showToast("Preparando Mesa "+c.mesa,"var(--blue)")}
  else if(c.status==="prep"){
    c.status="lista";
    const m=S.mesas[c.mesa];if(m)m.pedidos.forEach(p=>{if(p.est==="prep")p.est="listo"});
    showToast("✓ Listo — Mesa "+c.mesa,"var(--green)");
  }else if(c.status==="lista"){c.status="entregada";showToast("Entregado — Mesa "+c.mesa)}
  saveState(S);renderKDS();
}

// ══════════════════════════
// ADMIN — REPORTES
// ══════════════════════════
function renderAdmin(){
  document.getElementById("adminContent").innerHTML=buildAdminHTML();
}
function setPeriod(p){reportPeriod=p;document.querySelectorAll(".period-btn").forEach(b=>b.classList.toggle("on",b.dataset.p===p));document.getElementById("adminContent").innerHTML=buildAdminHTML()}

function buildAdminHTML(){
  const ahora=hoy();
  const desde={dia:ahora,semana:semanaAtras(),mes:mesAtras()}[reportPeriod];
  const ventas=S.ventas.filter(v=>v.fecha>=desde);

  const totalVentas=ventas.reduce((a,v)=>a+v.subtotal,0);
  const totalPropinas=ventas.reduce((a,v)=>a+v.propina,0);
  const totalGeneral=ventas.reduce((a,v)=>a+v.total,0);
  const nMesas=ventas.length;
  const ticketProm=nMesas?Math.round(totalGeneral/nMesas):0;

  // Por tipo doc
  const porTipo={boleta:0,factura:0,exenta:0};
  ventas.forEach(v=>porTipo[v.tipo]=(porTipo[v.tipo]||0)+v.total);
  // Por método pago
  const porPago={efectivo:0,debito:0,credito:0,transfer:0};
  ventas.forEach(v=>porPago[v.pago]=(porPago[v.pago]||0)+v.total);

  // Items ranking
  const itemMap={};
  ventas.forEach(v=>v.items&&v.items.forEach(i=>{
    const k=i.name;
    if(!itemMap[k])itemMap[k]={name:k,qty:0,total:0};
    itemMap[k].qty+=i.qty;
    itemMap[k].total+=i.price*i.qty;
  }));
  const topItems=Object.values(itemMap).sort((a,b)=>b.qty-a.qty).slice(0,10);
  const maxQty=topItems[0]?.qty||1;

  const periodLabel={dia:"Hoy",semana:"Esta semana",mes:"Este mes"}[reportPeriod];

  return`
  <div class="rpt-section">
    <div class="period-btns">
      <button class="period-btn${reportPeriod==="dia"?" on":""}" data-p="dia" onclick="setPeriod('dia')">HOY</button>
      <button class="period-btn${reportPeriod==="semana"?" on":""}" data-p="semana" onclick="setPeriod('semana')">SEMANA</button>
      <button class="period-btn${reportPeriod==="mes"?" on":""}" data-p="mes" onclick="setPeriod('mes')">MES</button>
    </div>
    <div class="kpi-grid">
      <div class="kpi-card"><span class="kpi-lbl">Ventas ${periodLabel}</span><div class="kpi-val gold">${fmt(totalGeneral)}</div><div class="kpi-sub">${nMesas} mesa${nMesas!==1?"s":""} atendida${nMesas!==1?"s":""}</div></div>
      <div class="kpi-card"><span class="kpi-lbl">Propinas</span><div class="kpi-val green">${fmt(totalPropinas)}</div><div class="kpi-sub">de ${fmt(totalVentas)} en ventas</div></div>
      <div class="kpi-card"><span class="kpi-lbl">Ticket Promedio</span><div class="kpi-val amber">${fmt(ticketProm)}</div><div class="kpi-sub">por mesa</div></div>
      <div class="kpi-card"><span class="kpi-lbl">Subtotal s/ propina</span><div class="kpi-val blue">${fmt(totalVentas)}</div><div class="kpi-sub">antes de propina</div></div>
    </div>
  </div>

  <div class="rpt-section">
    <div class="rpt-title">Por tipo de documento</div>
    <div style="display:flex;flex-direction:column;gap:6px">
      ${["boleta","factura","exenta"].map(t=>{
        const v=porTipo[t]||0;const pct=totalGeneral?Math.round(v/totalGeneral*100):0;
        const lbl={boleta:"Boleta",factura:"Factura",exenta:"B. Exenta"}[t];
        return`<div style="background:var(--d2);border:1px solid #111;border-radius:3px;padding:10px 14px">
          <div style="display:flex;justify-content:space-between;margin-bottom:5px">
            <span style="font-family:'Bebas Neue',sans-serif;font-size:15px">${lbl}</span>
            <span style="font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--gold)">${fmt(v)}</span>
          </div>
          <div style="background:var(--d3);height:5px;border-radius:3px;overflow:hidden">
            <div style="height:100%;background:var(--gold);width:${pct}%;border-radius:3px"></div>
          </div>
          <div style="font-size:10px;color:var(--muted);margin-top:3px">${pct}% del total</div>
        </div>`;
      }).join("")}
    </div>
  </div>

  <div class="rpt-section">
    <div class="rpt-title">Por método de pago</div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px">
      ${["efectivo","debito","credito","transfer"].map(t=>{
        const v=porPago[t]||0;const lbl={efectivo:"💵 Efectivo",debito:"💳 Débito",credito:"💳 Crédito",transfer:"📲 Transfer"}[t];
        return`<div style="background:var(--d2);border:1px solid #111;border-radius:3px;padding:10px 12px">
          <div style="font-size:12px;color:var(--muted);margin-bottom:3px">${lbl}</div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--cream)">${fmt(v)}</div>
        </div>`;
      }).join("")}
    </div>
  </div>

  <div class="rpt-section">
    <div class="rpt-title">🏆 Top ítems vendidos</div>
    ${topItems.length?`<div class="items-rank">${topItems.map((it,i)=>`
      <div class="ir-row">
        <div class="ir-rank">${i+1}</div>
        <div class="ir-name">${it.name}</div>
        <div class="ir-bar-wrap"><div class="ir-bar" style="width:${Math.round(it.qty/maxQty*100)}%"></div></div>
        <div class="ir-qty">${fmt2(it.qty)} uds</div>
        <div class="ir-total">${fmt(it.total)}</div>
      </div>`).join("")}</div>`
    :`<div class="order-empty">Sin datos para el período</div>`}
  </div>

  <div class="rpt-section">
    <div class="rpt-title">Historial de cobros <span style="font-size:11px;color:var(--muted);letter-spacing:1px">${periodLabel}</span></div>
    ${ventas.length?`<div class="ventas-list">${[...ventas].reverse().map(v=>`
      <div class="venta-row">
        <div>
          <div class="vr-mesa">Mesa ${v.mesa}</div>
          <div class="vr-fecha">${fechaLocal(v.fecha)} ${v.hora} · ${v.salon}</div>
          ${v.notas?`<div style="font-size:10px;color:var(--muted);font-style:italic;margin-top:1px">${v.notas}</div>`:""}
        </div>
        <div style="text-align:right">
          <div class="vr-total">${fmt(v.total)}</div>
          <div style="display:flex;gap:4px;justify-content:flex-end;margin-top:3px;flex-wrap:wrap">
            <span class="vr-tipo tipo-${v.tipo}">${{boleta:"Boleta",factura:"Factura",exenta:"Exenta"}[v.tipo]}</span>
            ${v.propina?`<span style="font-size:10px;color:var(--green)">+${fmt(v.propina)} prop.</span>`:""}
          </div>
        </div>
      </div>`).join("")}</div>`
    :`<div class="order-empty">Sin cobros en este período</div>`}
  </div>
  <div style="height:30px"></div>`;
}
</script>
</body>
</html>
